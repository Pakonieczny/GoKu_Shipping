      if (before && !/\n$/.test(before)) prefix = "\n";
      textarea.value = before + prefix + text + after;
      const pos = (before + prefix + text).length;
      textarea.selectionStart = textarea.selectionEnd = pos;
      textarea.focus();
    }

    // Load any existing draft from Firestore and render it. Called on
    // thread open. Silent if no draft exists (card shows empty state).
    async function hydrateAiDraft(thread) {
      try {
        const draftId = "draft_" + thread.id;
        const res = await api("firestoreProxy", {
          method: "GET",
          query: { op: "get", coll: "EtsyMail_Drafts", id: draftId }
        });
        if (!res || !res.exists || !res.doc) return;
        const d = res.doc;
        // Only populate textarea if the operator hasn't started typing
        // something different. (Simple heuristic: textarea is empty or
        // matches the cached draft text — don't clobber in-progress edits.)
        const ta = $("emDraftText");
        if (ta && !ta.value.trim()) {
          ta.value = d.text || "";
        }
        renderAiDraftCard(d);
        // Show revise row since there's a draft present
        const row = $("emReviseRow");
        if (row) row.style.display = "flex";
      } catch (e) {
        // Non-fatal — no draft yet, or proxy error. Leave the empty state.
        console.warn("hydrateAiDraft:", e.message);
      }
    }

    // Read operator name from localStorage. Matches the convention the
    // rest of the app uses (employee_name or employee_id). Falls back
    // to null, which the backend handles with a generic signature.
    function getEmployeeName() {
      try {
        return localStorage.getItem("employee_name") ||
               localStorage.getItem("etsymail_operator") ||
               null;
      } catch { return null; }
    }

    // ─── M3: Customer panel logic ───────────────────────────────────────
    // Populates the collapsed/expanded customer card at the top of the
    // detail pane. Reads the cached customer doc (EtsyMail_Customers)
    // keyed by buyerUserId scraped from the thread. Falls back gracefully
    // if buyerUserId is missing (older thread, pre-v0.8.0 scraper) or if
    // the customer hasn't been synced yet.
    async function hydrateCustomerPanel(thread) {
      const panel = $("emCustPanel");
      if (!panel) return;

      const head = $("emCustHead");
      const avatarEl = $("emCustAvatar");
      const summaryEl = $("emCustSummary");
      const expandEl = $("emCustExpand");

      // Render avatar (from scraped buyerAvatarUrl, always available if
      // recent scrape, even without buyerUserId)
      if (thread.buyerAvatarUrl) {
        avatarEl.innerHTML = '<img src="' + esc(thread.buyerAvatarUrl) +
          '" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(document.createTextNode(\'\u00a0\'));">';
      } else {
        avatarEl.textContent = (thread.customerName || thread.etsyUsername || "?")
          .slice(0, 1).toUpperCase();
      }

      // Click to toggle expand/collapse
      head.onclick = () => {
        const isCollapsed = panel.classList.contains("collapsed");
        if (isCollapsed) {
          panel.classList.remove("collapsed");
          panel.classList.add("expanded");
        } else {
          panel.classList.add("collapsed");
          panel.classList.remove("expanded");
        }
      };

      // Fetch customer doc if buyerUserId present
      let customer = null;
      if (thread.buyerUserId) {
        try {
          const data = await api("firestoreProxy", {
            query: { op: "get", coll: CUSTOMERS_COLL, id: String(thread.buyerUserId) }
          });
          customer = data.exists ? data.doc : null;
        } catch (e) {
          console.warn("customer fetch failed:", e.message);
        }
      }

      // Repeat buyer badge — ONLY show when our cached order data confirms it.
      // Etsy's scraped badge (thread.buyerIsRepeatBuyer) is unreliable and can
      // false-positive on pre-purchase inquiries. We trust ONLY the orderCount
      // from our own Etsy API-sourced customer doc.
      const repeatBadge = (customer && customer.orderCount >= 2)
        ? '<span class="em-cust-repeat" title="Verified: has ' + customer.orderCount + ' orders in last 2 years">Repeat buyer</span>'
        : '';

      const nameHtml = '<span class="em-cust-name">' +
        esc(thread.customerName || (customer && customer.displayName) || "Unknown") +
        '</span>';
      const userHtml = thread.etsyUsername
        ? '<span class="em-cust-username">@' + esc(thread.etsyUsername) + '</span>'
        : '';

      let statsInline = '';
      if (customer) {
        const money = fmtMoney(customer.totalSpent, customer.currency);
        statsInline = '<span class="em-cust-stat"><b>' + (customer.orderCount || 0) +
          '</b> order' + (customer.orderCount === 1 ? '' : 's') + '</span>' +
          ' · <span class="em-cust-stat"><b>' + money + '</b> total</span>';
      } else if (thread.buyerUserId) {
        // Honest messaging — no false "can be synced" implication.
        // This customer has no cached order data, meaning they likely
        // haven't purchased in the last 2 years (or ever).
        statsInline = '<span class="em-muted" style="font-size:12px; color:#9a6700;">⚠ No recent order history</span>';
      } else {
        statsInline = '<span class="em-muted" style="font-size:12px;">Customer ID not captured</span>';
      }

      summaryEl.innerHTML = nameHtml + ' ' + userHtml + ' ' + repeatBadge + ' ' + statsInline;

      // Render expanded content
      if (customer) {
        expandEl.innerHTML = renderCustomerExpanded(customer, thread);
        bindOrderClicks(expandEl);
      } else if (thread.buyerUserId) {
        // Honest explanation: they're not in our 2-year cache. That means
        // either they haven't purchased recently, or Etsy's repeat-buyer
        // badge is wrong about them. We do NOT offer a sync button
        // because a sync won't help — the full backfill is already done
        // and they're genuinely not in the receipt data.
        expandEl.innerHTML = '<div class="em-cust-nodata" style="background:#fff8c5; border:1px solid #d4a72c;">' +
          '<b>⚠ No purchase history in the last 2 years.</b>' +
          '<div style="margin-top:6px; font-size:12px; line-height:1.5; color:#24292f;">' +
          'This buyer has no cached orders. They may be:' +
          '<ul style="margin:6px 0 0 18px; padding:0;">' +
          '<li>A <b>pre-purchase inquiry</b> (never ordered from this shop)</li>' +
          '<li>An <b>older customer</b> whose last order was before ' + fmtShortDate(Date.now() - 730*86400*1000) + '</li>' +
          '</ul>' +
          '<div style="margin-top:8px; font-size:11px; color:#6a737d;">' +
          'Note: Etsy\'s "Repeat buyer" badge can appear incorrectly for non-buyers. ' +
          'Treat this thread as new unless the customer mentions a specific order number.' +
          '</div>' +
          '</div>' +
          '</div>';
      } else {
        expandEl.innerHTML = '<div class="em-cust-nodata">' +
          '<b>Customer ID not captured</b><br>' +
          '<span style="font-size:12px;">This thread was scraped before v0.8.0. Rescrape on Etsy to enable customer history lookup.</span>' +
          '</div>';
      }
    }

    function fmtMoney(amount, currency) {
      if (typeof amount !== "number") return "—";
      const sym = currency === "USD" || !currency ? "$" : (currency + " ");
      return sym + amount.toFixed(2);
    }

    function fmtShortDate(ts) {
      const d = toDate(ts);
      if (!d) return "—";
      return d.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
    }

    function renderCustomerExpanded(customer, thread) {
      const firstDate = fmtShortDate(customer.firstOrderAt);
      const lastDate  = fmtShortDate(customer.lastOrderAt);
      const money     = fmtMoney(customer.totalSpent, customer.currency);
      const recent    = Array.isArray(customer.recentReceipts) ? customer.recentReceipts : [];

      // Compute the start of the sync window (2 years ago) for the disclaimer.
      // This reminds operators that stats don't include older purchases.
      const syncCutoffDate = fmtShortDate(Date.now() - 730 * 86400 * 1000);

      const statsHtml = `
        <div class="em-cust-stats-grid">
          <div class="em-cust-stat-block">
            <span class="em-label">Orders</span>
            <span class="em-value">${customer.orderCount || 0}</span>
          </div>
          <div class="em-cust-stat-block">
            <span class="em-label">Total spent</span>
            <span class="em-value">${esc(money)}</span>
          </div>
          <div class="em-cust-stat-block">
            <span class="em-label">First order</span>
            <span class="em-value">${esc(firstDate)}</span>
          </div>
          <div class="em-cust-stat-block">
            <span class="em-label">Last order</span>
            <span class="em-value">${esc(lastDate)}</span>
          </div>
        </div>
        <div style="font-size:10px; color:#6a737d; margin-top:4px; text-align:right; font-style:italic;">
          Includes purchases from ${esc(syncCutoffDate)} onward. Older orders not shown.
        </div>`;

      const ordersHtml = recent.length
        ? `<div class="em-cust-orders">${recent.map(r => {
            const orderedAt = fmtShortDate(r.orderedAt);
            const total = fmtMoney(r.grandTotal, r.currency || customer.currency);
            const statusClass = (r.status || "").toLowerCase().replace(/[^a-z]/g, "");
            const statusText = r.isShipped ? "shipped" : (r.isPaid ? "paid" : (r.status || "open"));
            return `
              <div class="em-cust-order" data-receipt-id="${esc(r.receiptId)}">
                <span class="em-order-id">#${esc(r.receiptId)}</span>
                <span class="em-order-date">${esc(orderedAt)}</span>
                <span class="em-order-total">${esc(total)}</span>
                <span class="em-order-status ${esc(statusClass)}">${esc(statusText)}</span>
              </div>`;
          }).join("")}</div>`
        : `<div class="em-muted" style="font-size:12px;padding:10px;">No recent orders recorded.</div>`;

      const peopleUrl = thread.buyerPeopleUrl
        ? `<a href="${esc(thread.buyerPeopleUrl)}" target="_blank" rel="noopener" style="color:inherit;">View Etsy profile →</a>`
        : "";

      return `
        ${statsHtml}
        <div>
          <div class="em-cust-orders-title">
            <span>Recent orders (${recent.length})</span>
            ${peopleUrl}
          </div>
          ${ordersHtml}
        </div>`;
    }

    function bindOrderClicks(container) {
      container.querySelectorAll(".em-cust-order").forEach(el => {
        const rid = el.dataset.receiptId;
        if (!rid) return;
        el.addEventListener("click", () => openOrderDetailModal(rid));
      });
    }

    // Manual sync trigger — retained for potential future use (e.g. a
    // settings panel button to force an incremental sync). No longer used
    // by the customer panel since a sync won't help customers who are
    // genuinely absent from the 2-year receipt history.
    window.triggerCustomerSync = async function() {
      toast("Triggering sync…");
      try {
        const resp = await fetch(FN("etsyMailSync") + "?action=trigger&mode=incremental", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}"
        });
        const data = await resp.json();
        if (data.invoked) {
          toast("Sync started. Check back in ~1 min.");
        } else {
          toast("Sync failed to start: " + (data.error || "unknown"));
        }
      } catch (e) {
        toast("Sync error: " + e.message);
      }
    };

    // ─── M3: Order detail modal ─────────────────────────────────────────
    async function openOrderDetailModal(receiptId) {
      // Close any existing modal
      document.querySelector(".em-modal-overlay")?.remove();

      const overlay = document.createElement("div");
      overlay.className = "em-modal-overlay";
      overlay.innerHTML = `
        <div class="em-modal">
          <div class="em-modal-header">
            <h3>Order #${esc(receiptId)}</h3>
            <button class="em-modal-close" aria-label="Close">
              <i class="material-icons">close</i>
            </button>
          </div>
          <div class="em-modal-body">
            <div class="em-modal-loading">
              <i class="material-icons" style="font-size:28px;">hourglass_empty</i>
              <div style="margin-top:8px;">Fetching live order details from Etsy…</div>
            </div>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      overlay.querySelector(".em-modal-close").onclick = () => overlay.remove();
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      // Fetch live order via etsyMailOrder endpoint (server-side, uses seeded token)
      try {
        const resp = await fetch(FN("etsyMailOrder") + "?receiptId=" + encodeURIComponent(receiptId));
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ error: "HTTP " + resp.status }));
          throw new Error(err.error || "Failed to fetch order");
        }
        const order = await resp.json();
        renderOrderModalBody(overlay, order);
      } catch (e) {
        overlay.querySelector(".em-modal-body").innerHTML =
          '<div class="em-modal-error">Could not load order details: ' + esc(e.message) + '</div>';
      }
    }

    function renderOrderModalBody(overlay, order) {
      const transactions = Array.isArray(order.transactions) ? order.transactions : [];
      const moneyAmt = (m) => m && typeof m.amount === "number" && typeof m.divisor === "number"
        ? (m.amount / m.divisor) : null;

      const itemsHtml = transactions.map(t => {
        const price = moneyAmt(t.price);
        const priceStr = price != null ? "$" + price.toFixed(2) : "";
        const qtyStr = t.quantity > 1 ? " × " + t.quantity : "";
        // Prefer server-enriched thumbnail_url (from getListingImages).
        // Fall back to legacy product_data.image_url if it's ever present.
        const imgUrl = t.thumbnail_url || (t.product_data && t.product_data.image_url) || "";
        const listingUrl = t.listing_url || (t.listing_id ? ('https://www.etsy.com/listing/' + t.listing_id) : "");
        const variations = Array.isArray(t.variations)
          ? t.variations.map(v => (v.formatted_name || "") + ": " + (v.formatted_value || "")).filter(Boolean).join(" · ")
          : "";
        const personalization = t.personalization ? ("Note: " + t.personalization) : "";
        const meta = [variations, personalization].filter(Boolean).join(" · ");

        // Render the item as a clickable card — opens the Etsy listing in a
        // new tab. If no listing URL (deleted listing, etc.), render non-clickable.
        const wrapOpen = listingUrl
          ? `<a href="${esc(listingUrl)}" target="_blank" rel="noopener" class="em-order-item em-order-item-link" title="View listing on Etsy">`
          : `<div class="em-order-item">`;
        const wrapClose = listingUrl ? `</a>` : `</div>`;

        const imgHtml = imgUrl
          ? `<img src="${esc(imgUrl)}" referrerpolicy="no-referrer" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'em-item-img-fallback',innerHTML:'<i class=\\'material-icons\\'>image_not_supported</i>'}));">`
          : `<div class="em-item-img-fallback"><i class="material-icons">image</i></div>`;

        return `
          ${wrapOpen}
            ${imgHtml}
            <div>
              <div class="em-item-title">${esc(t.title || "Item")}${esc(qtyStr)}</div>
              ${meta ? '<div class="em-item-meta">' + esc(meta) + '</div>' : ''}
              ${listingUrl ? '<div class="em-item-link-hint">View listing →</div>' : ''}
            </div>
            <div class="em-item-price">${esc(priceStr)}</div>
          ${wrapClose}`;
      }).join("") || '<div class="em-muted">No items found.</div>';

      const addr = [
        order.name,
        order.first_line,
        order.second_line,
        [order.city, order.state, order.zip].filter(Boolean).join(", "),
        order.country_iso
      ].filter(Boolean).map(esc).join("<br>");

      const grand = moneyAmt(order.grandtotal);
      const shipping = moneyAmt(order.total_shipping_cost);
      const tax = moneyAmt(order.total_tax_cost);

      const totalsHtml = `
        <table style="font-size:12px;border-collapse:collapse;margin-left:auto;">
          ${order.total_price ? '<tr><td>Subtotal</td><td style="text-align:right;padding-left:20px;">$' + moneyAmt(order.total_price).toFixed(2) + '</td></tr>' : ''}
          ${shipping != null ? '<tr><td>Shipping</td><td style="text-align:right;padding-left:20px;">$' + shipping.toFixed(2) + '</td></tr>' : ''}
          ${tax != null ? '<tr><td>Tax</td><td style="text-align:right;padding-left:20px;">$' + tax.toFixed(2) + '</td></tr>' : ''}
          ${grand != null ? '<tr style="font-weight:600;border-top:1px solid #e1e4e8;"><td>Total</td><td style="text-align:right;padding-left:20px;">$' + grand.toFixed(2) + '</td></tr>' : ''}
        </table>`;

      const statusBadge = order.is_shipped ? "shipped" : (order.is_paid ? "paid" : (order.status || "open"));

      overlay.querySelector(".em-modal-body").innerHTML = `
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;">
          <span class="em-order-status ${esc(statusBadge.toLowerCase().replace(/[^a-z]/g,''))}" style="font-size:11px;padding:3px 8px;border-radius:4px;">${esc(statusBadge)}</span>
          ${order.created_timestamp ? '<span class="em-muted" style="font-size:12px;">Ordered ' + esc(fmtShortDate(order.created_timestamp * 1000)) + '</span>' : ''}
          <a href="https://www.etsy.com/your/orders/sold/new?order_id=${esc(order.receipt_id)}" target="_blank" rel="noopener" style="margin-left:auto;font-size:12px;">View on Etsy →</a>
        </div>

        <div class="em-order-items">${itemsHtml}</div>

        <div class="em-order-section">
          <h5>Shipping to</h5>
          <div class="em-order-ship">${addr || '<span class="em-muted">No address</span>'}</div>
        </div>

        <div class="em-order-section" style="display:flex;">
          ${totalsHtml}
        </div>`;
    }

    // Convert plain Etsy listing URLs in escaped text into clickable <a> tags.
    // Input must already be HTML-escaped. Matches:
    //   https://www.etsy.com/listing/1234567/slug
    //   http://etsy.com/listing/1234567
    //   www.etsy.com/listing/1234567
    //   etsy.com/listing/1234567
    // Preserves the URL's visible text and makes it clickable.
    function linkifyEtsyUrls(escapedText) {
      if (!escapedText) return "";
      // Match with optional protocol/subdomain, listing ID, optional slug
      const re = /((?:https?:\/\/)?(?:www\.)?etsy\.com\/listing\/\d+[\w\-\/]*)/gi;
      return escapedText.replace(re, (match) => {
        let href = match;
        if (!/^https?:\/\//i.test(href)) href = "https://" + href.replace(/^\/+/, "");
        return '<a href="' + href + '" target="_blank" rel="noopener" ' +
          'style="color:inherit;text-decoration:underline;">' + match + '</a>';
      });
    }

    // Render a compact Etsy listing card. Shows thumbnail + title + price.
    // Entire card clickable, opens listing in new tab.
    function renderListingCard(card) {
      const title = esc(card.title || "Etsy listing");
      const priceText = esc(card.priceText || "");
      const origPrice = esc(card.originalPriceText || "");
      const shipping  = esc(card.shippingText || "");
      const listingUrl = esc(card.listingUrl || "");
      const thumbUrl   = esc(card.thumbnailUrl || "");

      // Price block: show current price; strikethrough original if present
      let priceHtml = "";
      if (priceText) {
        priceHtml = '<div style="font-size:13px;color:inherit;opacity:0.9;">' +
          '<strong>' + priceText + '</strong>' +
          (origPrice ? ' <span style="text-decoration:line-through;opacity:0.6;margin-left:4px;">' + origPrice + '</span>' : '') +
          '</div>';
      }
      const shippingHtml = shipping
        ? '<div style="font-size:11px;opacity:0.7;margin-top:2px;">' + shipping + '</div>'
        : '';

      // Fallback SVG if thumbnail fails to load
      const placeholderSvg = 'data:image/svg+xml;utf8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">' +
        '<rect width="60" height="60" fill="#f3f4f6" stroke="#d1d5db"/>' +
        '<text x="30" y="32" text-anchor="middle" font-family="system-ui" font-size="10" fill="#6b7280">Etsy</text>' +
        '</svg>'
      );

      return '<a href="' + listingUrl + '" target="_blank" rel="noopener" ' +
        'style="display:flex;align-items:center;gap:10px;padding:8px;margin-top:6px;' +
        'border:1px solid rgba(0,0,0,0.12);border-radius:8px;background:rgba(255,255,255,0.08);' +
        'text-decoration:none;color:inherit;max-width:360px;" ' +
        'title="Open Etsy listing">' +
        '<img src="' + thumbUrl + '" alt="" loading="lazy" ' +
        'style="width:60px;height:60px;object-fit:cover;border-radius:6px;background:#fff;flex-shrink:0;" ' +
        'onerror="this.onerror=null;this.src=\'' + placeholderSvg + '\';"/>' +
        '<div style="min-width:0;flex:1;">' +
        '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;' +
        'display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">' + title + '</div>' +
        priceHtml + shippingHtml +
        '</div>' +
        '</a>';
    }

    function renderThreadMessages() {
      const box = $("emThreadBox");
      if (!box) return;
      if (!state.messages.length) {
        box.innerHTML = `<div class="em-muted" style="font-size:12px;">No messages yet. The extension will populate this after its first scrape.</div>`;
        return;
      }
      box.innerHTML = state.messages.map(m => {
        const cls = m.source === "ai" ? "ai"
                  : m.direction === "outbound" ? "outbound"
                  : "inbound";
        const who  = m.senderName || (m.senderRole || m.source || "unknown");
        const when = fmtTime(m.timestamp || m.createdAt);

        // Render any message that has imageUrls as inline thumbnails —
        // whether it's a standalone image message (messageType:"image")
        // or a text message with attached photos.
        const hasImages = Array.isArray(m.imageUrls) && m.imageUrls.length > 0;

        let body;
        if (hasImages) {
          const thumbs = (Array.isArray(m.thumbnailUrls) && m.thumbnailUrls.length)
            ? m.thumbnailUrls
            : m.imageUrls;
          const thumbsHtml = m.imageUrls.map((fullUrl, idx) => {
            const thumbUrl = thumbs[idx] || fullUrl;
            // If the image has been mirrored to Firebase Storage, use the
            // redirector endpoint which signs a fresh URL on every request.
            // Otherwise fall back to the Etsy CDN URL (which may fail to load
            // due to hotlink protection, but the click-through still works).
            const storagePath = Array.isArray(m.storageImagePaths) ? m.storageImagePaths[idx] : null;
            const mirrorUrl = storagePath
              ? FN("etsyMailImage") + "?path=" + encodeURIComponent(storagePath)
              : null;
            const displayThumb = mirrorUrl || thumbUrl;
            const displayFull  = mirrorUrl || fullUrl;
            // Medium thumbnail, max 280px. If the thumbnail fails to load,
            // swap the <img> for a small clickable "📷 View image" placeholder
            // so the link to full-res is still accessible.
            const placeholderSvg = 'data:image/svg+xml;utf8,' + encodeURIComponent(
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" width="120" height="90">' +
              '<rect width="120" height="90" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>' +
              '<text x="60" y="45" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">📷 View image</text>' +
              '</svg>'
            );
            return '<a href="' + esc(displayFull) + '" target="_blank" rel="noopener" ' +
              'style="display:block;max-width:280px;margin:4px 0;text-decoration:none;" ' +
              'title="Click to open full-size image">' +
              '<img src="' + esc(displayThumb) + '" alt="attached image" loading="lazy" ' +
              'style="width:100%;max-width:100%;height:auto;max-height:280px;object-fit:contain;border-radius:8px;border:1px solid rgba(0,0,0,0.1);background:#fff;cursor:zoom-in;display:block;" ' +
              'onerror="this.onerror=null;this.src=\'' + placeholderSvg + '\';this.style.width=\'120px\';this.style.height=\'90px\';this.style.maxHeight=\'90px\';this.style.cursor=\'pointer\';"/>' +
              '</a>';
          }).join("");
          const linkedText = m.text ? linkifyEtsyUrls(esc(m.text)) : "";
          const textPart = linkedText ? `<div style="margin-top:6px;">${linkedText}</div>` : "";
          body = `<div>${thumbsHtml}</div>${textPart}`;
        } else {
          body = linkifyEtsyUrls(esc(m.text || ""));
        }

        // Append any Etsy listing cards associated with this message
        let cardsHtml = "";
        if (Array.isArray(m.listingCards) && m.listingCards.length) {
          cardsHtml = '<div style="margin-top:6px;display:flex;flex-direction:column;gap:4px;">' +
            m.listingCards.map(renderListingCard).join("") +
            '</div>';
        }

        return `
          <div class="em-msg ${cls}">
            <div class="em-meta">${esc(who)} · ${esc(when)}</div>
            <div>${body}${cardsHtml}</div>
          </div>`;
      }).join("");
      box.scrollTop = box.scrollHeight;
    }

    // ───── Actions ─────
    async function setStatus(threadId, status, reason) {
      try {
        await api("etsyMailThreads", { method: "POST", body: { action: "setStatus", threadId, status, reason } });
        toast(`Status → ${status}`);
        fetchThreadListNow();
      } catch (e) { toast("Error: " + e.message); }
    }

    async function saveStaffMessage(threadId) {
      const text = $("emDraftText").value.trim();
      if (!text) { toast("Nothing to save"); return; }
      try {
        await api("etsyMailThreads", {
          method: "POST",
          body: {
            action: "appendMessage", threadId,
            message: { source: "staff", direction: "outbound", senderName: "Staff", senderRole: "staff", text }
          }
        });
        $("emDraftText").value = "";
        toast("Staff message saved");
        fetchMessagesNow(threadId);
        fetchThreadListNow();
      } catch (e) { toast("Error: " + e.message); }
    }

    async function createTestThread() {
      const name = prompt("Test customer name?", "Test Customer");
      if (!name) return;
      const text = prompt("Initial inbound message?", "Hi, where is my order?");
      try {
        const data = await api("etsyMailThreads", {
          method: "POST",
          body: {
            action: "create", customerName: name, initialText: text,
            source: "manual", status: "detected_from_gmail",
            subject: text ? text.slice(0, 60) : null
          }
        });
        toast(`Thread created: ${data.threadId}`);
        fetchThreadListNow();
        openThread(data.threadId);
      } catch (e) { toast("Error: " + e.message); }
    }

    function setBackendOk(ok, label) {
      const dot = $("emBackendDot");
      const lab = $("emBackendLabel");
      if (dot) dot.classList.toggle("ok", !!ok);
      if (lab) lab.textContent = label;
    }

    // Pause polling when tab hidden
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopListPolling();
        stopMessagesPolling();
        stopCountsPolling();
        $("emPollingIndicator").textContent = "paused (tab hidden)";
      } else {
        startListPolling();
        startCountsPolling();
        if (state.selectedId) startMessagesPolling(state.selectedId);
        $("emPollingIndicator").textContent = "polling every 5s";
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      renderRail();

      $("emRefreshBtn").addEventListener("click", () => {
        fetchThreadListNow();
        fetchCountsNow();
        if (state.selectedId) fetchMessagesNow(state.selectedId);
        toast("Refreshed");
      });
      $("emNewThreadBtn").addEventListener("click", createTestThread);
      $("emSettingsBtn").addEventListener("click", () => toast("Settings panel arrives in Milestone 3."));
      $("emSearchInput").addEventListener("input", (e) => {
        state.searchText = e.target.value || "";
        renderThreadList();
      });

      startListPolling();
      startCountsPolling();

      document.body.classList.add("ready");
    });
  })();
  </script>
</body>
</html>
