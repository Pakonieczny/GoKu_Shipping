<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EtsyMail — Operator Inbox</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1f2328; }
    body { opacity: 0; transition: opacity .2s; }
    body.ready { opacity: 1; }

    .em-app {
      display: grid;
      grid-template-columns: 220px 380px 1fr;
      grid-template-rows: 48px 1fr;
      grid-template-areas: "topbar topbar topbar" "rail list detail";
      height: 100vh;
    }
    .em-topbar {
      grid-area: topbar; display: flex; align-items: center;
      background: #1f2328; color: #f4f5f7; padding: 0 16px; gap: 12px;
      border-bottom: 1px solid #111;
    }
    .em-topbar .em-title { font-weight: 600; font-size: 15px; letter-spacing: .2px; }
    .em-topbar .em-title .em-tag { font-weight: 400; color: #9aa3ad; font-size: 12px; margin-left: 8px; }
    .em-topbar .em-spacer { flex: 1; }
    .em-topbar button {
      background: #2a2f36; color: #f4f5f7; border: 1px solid #3a424b;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .em-topbar button:hover { background: #353b44; }
    .em-topbar button .material-icons { font-size: 16px; }
    .em-topbar .em-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; }
    .em-topbar .em-status-dot.ok { background: #2ecc71; }

    .em-rail {
      grid-area: rail; background: #fff; border-right: 1px solid #e1e4e8;
      overflow-y: auto; padding: 8px 0;
    }
    .em-rail .em-rail-section {
      padding: 10px 14px 4px; font-size: 10px; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase; color: #6a737d;
    }
    .em-rail .em-rail-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; cursor: pointer; font-size: 13px;
      color: #24292e; user-select: none;
    }
    .em-rail .em-rail-item:hover { background: #f6f8fa; }
    .em-rail .em-rail-item.active { background: #e7f3ff; color: #0366d6; font-weight: 500; }
    .em-rail .em-rail-item .em-count {
      background: #eaeef2; color: #57606a; font-size: 11px;
      padding: 1px 7px; border-radius: 10px; min-width: 20px; text-align: center;
    }
    .em-rail .em-rail-item.active .em-count { background: #0366d6; color: #fff; }
    .em-rail .em-rail-item .material-icons { font-size: 15px; margin-right: 8px; opacity: .65; }

    .em-list {
      grid-area: list; background: #fff; border-right: 1px solid #e1e4e8;
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .em-list-header {
      padding: 10px 14px; border-bottom: 1px solid #e1e4e8;
      display: flex; align-items: center; gap: 8px;
      position: sticky; top: 0; background: #fff; z-index: 2;
    }
    .em-list-header input {
      flex: 1; border: 1px solid #d0d7de; border-radius: 4px;
      padding: 5px 8px; font-size: 12px; outline: none; background: #f6f8fa;
    }
    .em-list-header input:focus { background: #fff; border-color: #0366d6; }
    .em-list-header button {
      border: 1px solid #d0d7de; background: #fff; border-radius: 4px;
      padding: 4px 8px; cursor: pointer; font-size: 12px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .em-list-header button .material-icons { font-size: 14px; }

    .em-list-items { flex: 1; overflow-y: auto; }
    .em-list-item {
      padding: 10px 14px; border-bottom: 1px solid #f0f2f5; cursor: pointer;
      display: grid; grid-template-columns: 1fr auto; gap: 4px 10px;
      grid-template-areas: "name time" "snippet snippet" "badges badges";
      position: relative;
    }
    .em-list-item:hover { background: #f6f8fa; }
    .em-list-item.selected { background: #e7f3ff; }
    .em-list-item.unread .em-name { font-weight: 700; }
    .em-list-item.unread::before {
      content: ""; position: absolute; left: 4px; top: 50%;
      width: 6px; height: 6px; border-radius: 50%; background: #0366d6;
      transform: translateY(-50%);
    }
    .em-name { grid-area: name; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .em-time { grid-area: time; font-size: 11px; color: #6a737d; }
    .em-snippet { grid-area: snippet; font-size: 12px; color: #57606a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .em-badges { grid-area: badges; display: flex; flex-wrap: wrap; gap: 4px; }
    .em-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #eaeef2; color: #57606a; font-weight: 500; }
    .em-badge.order { background: #dcffe4; color: #116329; }
    .em-badge.category { background: #ddf4ff; color: #0969da; }
    .em-badge.attachment { background: #fff8c5; color: #7d4e00; }
    .em-badge.confidence { background: #f6e5ff; color: #6b21a8; }
    .em-badge.hold { background: #ffebe9; color: #a40e26; }

    .em-list-empty { padding: 40px 20px; text-align: center; color: #6a737d; font-size: 13px; }

    .em-detail { grid-area: detail; background: #f4f5f7; overflow-y: auto; display: flex; flex-direction: column; }
    .em-detail-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #6a737d; font-size: 13px; text-align: center; padding: 20px;
    }
    .em-detail-header { background: #fff; border-bottom: 1px solid #e1e4e8; padding: 12px 18px; }
    .em-detail-header .em-h-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .em-detail-header h2 { margin: 0; font-size: 16px; font-weight: 600; }
    .em-detail-header .em-h-meta { margin-top: 4px; font-size: 12px; color: #57606a; display: flex; gap: 14px; flex-wrap: wrap; }
    .em-detail-header .em-h-actions { display: flex; gap: 6px; }
    .em-detail-header .em-h-actions button {
      border: 1px solid #d0d7de; background: #fff; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; font-size: 12px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .em-detail-header .em-h-actions button:hover { background: #f6f8fa; }
    .em-detail-header .em-h-actions button .material-icons { font-size: 14px; }

    /* ── M3: Customer panel (top banner above messages) ─────────────────── */
    .em-cust-panel {
      background: #fff; border-bottom: 1px solid #e1e4e8;
      padding: 10px 18px; cursor: default;
    }
    .em-cust-panel.collapsed .em-cust-expand { display: none; }
    .em-cust-head {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      user-select: none;
    }
    .em-cust-head:hover { background: #fafbfc; margin: -10px -18px; padding: 10px 18px; }
    .em-cust-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: #e1e4e8;
      overflow: hidden; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; color: #6a737d; font-size: 14px; font-weight: 600;
    }
    .em-cust-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .em-cust-summary {
      flex: 1; display: flex; gap: 10px; align-items: center;
      font-size: 13px; flex-wrap: wrap; min-width: 0;
    }
    .em-cust-name { font-weight: 600; color: #24292f; }
    .em-cust-username { color: #57606a; font-size: 12px; }
    .em-cust-repeat {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      background: #dafbe1; color: #1a7f37; font-size: 11px; font-weight: 600;
    }
    .em-cust-stat { color: #57606a; font-size: 12px; }
    .em-cust-stat b { color: #24292f; font-weight: 600; }
    .em-cust-chevron {
      color: #6a737d; font-size: 18px; margin-left: auto; flex-shrink: 0;
      transition: transform .15s;
    }
    .em-cust-panel.expanded .em-cust-chevron { transform: rotate(180deg); }

    .em-cust-expand {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #f0f2f5;
      display: grid; grid-template-columns: 1fr; gap: 10px;
    }
    .em-cust-stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      background: #f6f8fa; padding: 10px; border-radius: 6px; font-size: 12px;
    }
    .em-cust-stat-block { display: flex; flex-direction: column; gap: 2px; }
    .em-cust-stat-block .em-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #6a737d; }
    .em-cust-stat-block .em-value { font-weight: 600; color: #24292f; font-size: 13px; }

    .em-cust-orders-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
      color: #6a737d; font-weight: 700; display: flex; align-items: center;
      justify-content: space-between;
    }
    .em-cust-orders {
      display: grid; grid-template-columns: 1fr; gap: 4px;
      max-height: 280px; overflow-y: auto;
    }
    .em-cust-order {
      display: grid; grid-template-columns: auto 1fr auto auto; gap: 10px;
      align-items: center; padding: 6px 10px; font-size: 12px;
      border: 1px solid #e1e4e8; border-radius: 6px; cursor: pointer;
      background: #fff; transition: background .1s;
    }
    .em-cust-order:hover { background: #f6f8fa; }
    .em-cust-order .em-order-id { font-family: monospace; color: #0969da; font-weight: 600; }
    .em-cust-order .em-order-date { color: #57606a; }
    .em-cust-order .em-order-total { font-weight: 600; color: #24292f; text-align: right; }
    .em-cust-order .em-order-status {
      font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
      padding: 2px 6px; border-radius: 4px; background: #f0f2f5; color: #57606a;
    }
    .em-cust-order .em-order-status.shipped { background: #dafbe1; color: #1a7f37; }
    .em-cust-order .em-order-status.paid    { background: #ddf4ff; color: #0969da; }
    .em-cust-order .em-order-status.canceled, .em-cust-order .em-order-status.cancelled { background: #ffebe9; color: #cf222e; }

    .em-cust-footer {
      display: flex; gap: 10px; align-items: center; font-size: 11px;
      color: #6a737d; padding-top: 4px;
    }
    .em-cust-footer button {
      background: #fff; border: 1px solid #d0d7de; border-radius: 4px;
      padding: 4px 10px; font-size: 11px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .em-cust-footer button:hover { background: #f6f8fa; }
    .em-cust-footer button[disabled] { opacity: .5; cursor: wait; }
    .em-cust-footer button .material-icons { font-size: 13px; }

    .em-cust-nodata {
      padding: 12px; background: #fff8c5; border: 1px solid #d4a72c;
      border-radius: 6px; font-size: 12px; color: #633c01;
    }

    /* ── M3: Order detail modal ─────────────────────────────────────────── */
    .em-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.4); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .em-modal {
      background: #fff; border-radius: 8px; max-width: 720px; width: 100%;
      max-height: 90vh; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 10px 40px rgba(0,0,0,.3);
    }
    .em-modal-header {
      padding: 14px 18px; border-bottom: 1px solid #e1e4e8;
      display: flex; align-items: center; justify-content: space-between;
    }
    .em-modal-header h3 { margin: 0; font-size: 15px; }
    .em-modal-close {
      background: none; border: none; cursor: pointer; color: #6a737d;
      padding: 4px;
    }
    .em-modal-close:hover { color: #24292f; }
    .em-modal-body {
      padding: 18px; overflow-y: auto; flex: 1;
    }
    .em-modal-loading, .em-modal-error {
      padding: 30px; text-align: center; color: #6a737d;
    }
    .em-modal-error { color: #cf222e; }
    .em-order-items {
      display: grid; grid-template-columns: 1fr; gap: 8px;
    }
    .em-order-item {
      display: grid; grid-template-columns: 60px 1fr auto; gap: 12px;
      padding: 10px; border: 1px solid #e1e4e8; border-radius: 6px;
      align-items: center;
    }
    .em-order-item-link {
      text-decoration: none; color: inherit;
      transition: background .15s, border-color .15s;
    }
    .em-order-item-link:hover {
      background: #f6f8fa; border-color: #0969da;
    }
    .em-order-item img {
      width: 60px; height: 60px; border-radius: 4px; object-fit: cover;
      background: #f0f2f5;
    }
    .em-item-img-fallback {
      width: 60px; height: 60px; border-radius: 4px;
      background: #f0f2f5; display: flex; align-items: center;
      justify-content: center; color: #9ba4ae;
    }
    .em-item-img-fallback .material-icons { font-size: 24px; }
    .em-order-item .em-item-title { font-weight: 500; font-size: 13px; }
    .em-order-item .em-item-meta { font-size: 11px; color: #57606a; margin-top: 2px; }
    .em-order-item .em-item-link-hint {
      font-size: 11px; color: #0969da; margin-top: 3px; opacity: 0;
      transition: opacity .15s;
    }
    .em-order-item-link:hover .em-item-link-hint { opacity: 1; }
    .em-order-item .em-item-price { font-weight: 600; color: #24292f; font-size: 13px; text-align: right; }
    .em-order-section { margin-top: 16px; }
    .em-order-section h5 {
      margin: 0 0 6px; font-size: 10px; text-transform: uppercase;
      letter-spacing: .6px; color: #6a737d; font-weight: 700;
    }
    .em-order-ship {
      font-size: 12px; line-height: 1.5; background: #f6f8fa;
      padding: 10px; border-radius: 6px;
    }


    .em-detail-body {
      padding: 14px 18px; display: grid;
      grid-template-columns: minmax(0, 1fr) 300px; gap: 14px; align-items: start;
    }
    .em-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 6px; padding: 12px 14px; }
    .em-card + .em-card { margin-top: 12px; }
    .em-card h4 {
      margin: 0 0 8px; font-size: 11px; font-weight: 700;
      letter-spacing: .6px; text-transform: uppercase; color: #6a737d;
    }
    .em-card .em-kv { display: grid; grid-template-columns: 110px 1fr; gap: 4px 10px; font-size: 12px; }
    .em-card .em-kv dt { color: #6a737d; }
    .em-card .em-kv dd { margin: 0; word-break: break-word; }

    .em-thread { min-height: 200px; }
    .em-thread .em-msg {
      padding: 8px 11px; border-radius: 8px; margin-bottom: 8px;
      max-width: 85%; font-size: 13px; line-height: 1.4; word-wrap: break-word;
    }
    .em-thread .em-msg.inbound  { background: #eaeef2; color: #1f2328; margin-right: auto; }
    .em-thread .em-msg.outbound { background: #0366d6; color: #fff;    margin-left:  auto; }
    .em-thread .em-msg.ai       { background: #f6e5ff; color: #4b0e63; margin-left:  auto; border: 1px dashed #c792e0; }
    .em-thread .em-msg .em-meta {
      font-size: 10px; opacity: .75; margin-bottom: 3px;
      text-transform: uppercase; letter-spacing: .4px;
    }

    .em-compose textarea {
      width: 100%; min-height: 100px; border: 1px solid #d0d7de;
      border-radius: 4px; padding: 8px 10px; font-size: 13px;
      font-family: inherit; resize: vertical; outline: none;
    }
    .em-compose textarea:focus { border-color: #0366d6; }
    .em-compose .em-compose-bar { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .em-compose button {
      border: 1px solid #d0d7de; background: #fff; border-radius: 4px;
      padding: 6px 12px; cursor: pointer; font-size: 12px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .em-compose button:hover { background: #f6f8fa; }
    .em-compose button.primary { background: #1f883d; color: #fff; border-color: #1a7f37; }
    .em-compose button.primary:hover { background: #1a7f37; }
    .em-compose button.ai { background: #8250df; color: #fff; border-color: #6639ba; }
    .em-compose button.ai:hover:not(:disabled) { background: #6639ba; }
    .em-compose button:disabled { opacity: .55; cursor: wait; }
    .em-compose button .material-icons { font-size: 14px; }
    .em-compose .em-compose-bar .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
      border-radius: 50%; animation: em-spin .7s linear infinite;
    }
    @keyframes em-spin { to { transform: rotate(360deg); } }

    /* ── M4 AI Draft card (right column) ─────────────────────────── */
    .em-ai-card .em-ai-empty {
      font-size: 12px; color: #6a737d;
    }
    .em-ai-card .em-ai-meta {
      display: flex; gap: 10px; flex-wrap: wrap;
      font-size: 11px; color: #6a737d; margin-bottom: 6px;
    }
    .em-ai-card .em-ai-meta .em-ai-chip {
      background: #eaeef2; padding: 2px 8px; border-radius: 10px;
    }
    .em-ai-card .em-ai-reasoning {
      background: #f6e5ff; border-left: 3px solid #8250df;
      padding: 6px 10px; border-radius: 3px; margin: 6px 0;
      font-size: 12px; color: #3b0764; line-height: 1.4;
    }
    .em-ai-card .em-ai-reasoning summary {
      cursor: pointer; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: .4px; color: #6639ba;
    }
    .em-ai-card .em-ai-reasoning summary:hover { color: #3b0764; }
    .em-ai-card .em-ai-warning {
      background: #fff8c5; border-left: 3px solid #d4a72c;
      padding: 6px 10px; border-radius: 3px; margin: 6px 0;
      font-size: 11px; color: #633c01;
    }

    /* ── Suggested-listing chips ─────────────────────────────────── */
    .em-suggested-listings {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 8px;
    }
    .em-suggested-listing {
      display: inline-flex; align-items: center; gap: 4px;
      background: #ddf4ff; color: #0969da;
      padding: 4px 8px; border-radius: 12px;
      font-size: 11px; cursor: pointer;
      border: 1px solid #b6e3ff;
      max-width: 240px;
    }
    .em-suggested-listing:hover { background: #b6e3ff; }
    .em-suggested-listing .material-icons { font-size: 13px; }
    .em-suggested-listing .em-sl-title {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Tracking images (attached to AI draft) ────────────────── */
    .em-tracking-images {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 10px;
    }
    .em-tracking-image-card {
      display: flex; flex-direction: column;
      border: 1px solid #d0d7de; border-radius: 6px;
      background: #f6f8fa; overflow: hidden;
    }
    .em-tracking-image-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: #fff;
      border-bottom: 1px solid #d0d7de; gap: 8px;
    }
    .em-tracking-image-header-left {
      display: flex; align-items: center; gap: 8px;
      min-width: 0; flex: 1;
    }
    .em-tracking-image-icon {
      width: 32px; height: 32px; border-radius: 6px;
      background: #0969da; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .em-tracking-image-icon .material-icons { font-size: 18px; }
    .em-tracking-image-meta {
      flex: 1; min-width: 0;
    }
    .em-tracking-image-title {
      font-weight: 600; font-size: 12px; color: #1e293b;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .em-tracking-image-subtitle {
      font-size: 10px; color: #64748b; font-family: monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .em-tracking-image-status {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 11px; white-space: nowrap;
      background: #ddf4ff; color: #0969da;
    }
    .em-tracking-image-status.delivered { background: #dcffe4; color: #116329; }
    .em-tracking-image-status.exception,
    .em-tracking-image-status.returned  { background: #ffebe9; color: #a40e26; }
    .em-tracking-image-body {
      padding: 8px;
      background: #fff;
      text-align: center;
    }
    .em-tracking-image-body img {
      max-width: 100%; height: auto;
      border: 1px solid #e6eaef; border-radius: 4px;
      cursor: zoom-in;
    }
    .em-tracking-image-actions {
      display: flex; gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid #d0d7de;
      background: #f6f8fa;
      flex-wrap: wrap;
    }
    .em-tracking-image-actions button {
      padding: 4px 10px; font-size: 11px;
      background: #fff; border: 1px solid #d0d7de; border-radius: 4px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
      color: #24292f;
    }
    .em-tracking-image-actions button:hover { background: #f3f4f6; }
    .em-tracking-image-actions button .material-icons { font-size: 13px; }
    .em-tracking-image-actions button.queued {
      background: #dcffe4; border-color: #2da44e; color: #116329;
    }
    .em-tracking-image-actions button.queued:hover { background: #b7ebc1; }
    .em-tracking-image-actions .em-muted-note {
      margin-left: auto; font-size: 10px; color: #64748b;
      align-self: center;
    }

    /* Placeholder for pending/failed tracking images */
    .em-ti-placeholder {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px; gap: 10px;
      color: #64748b; font-size: 13px; text-align: center;
    }
    .em-ti-placeholder .material-icons { font-size: 32px; }
    .em-ti-pending .material-icons { color: #0969da; }
    .em-ti-failed  .material-icons { color: #cf222e; }
    .em-ti-failed  { color: #a40e26; }
    .em-ti-muted   { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .em-ti-error-detail {
      font-size: 11px; color: #64748b;
      font-family: monospace; max-width: 320px;
      overflow-wrap: break-word;
    }
    @keyframes em-ti-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .em-ti-spin { animation: em-ti-spin 1.1s linear infinite; }

    /* ── Revise instructions popover ─────────────────────────────── */
    .em-revise-row {
      display: flex; gap: 6px; margin-top: 6px; align-items: stretch;
    }
    .em-revise-row input {
      flex: 1; padding: 6px 10px; border: 1px solid #d0d7de;
      border-radius: 4px; font-size: 12px; font-family: inherit;
      outline: none;
    }
    .em-revise-row input:focus { border-color: #8250df; }
    .em-revise-row button {
      padding: 6px 10px; font-size: 11px;
    }

    /* ── Token counter (under the composer textarea) ─────────────── */
    .em-token-counter {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
      padding: 6px 10px; margin-top: 6px;
      background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 4px;
      font-size: 11px; color: #57606a;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .em-token-counter.empty {
      color: #8c959f; background: transparent; border-style: dashed;
    }
    .em-token-counter .em-tok-label {
      color: #8c959f; text-transform: uppercase; letter-spacing: .4px;
      font-size: 10px; margin-right: 2px;
    }
    .em-token-counter .em-tok-val {
      color: #24292f; font-weight: 600;
    }
    .em-token-counter .em-tok-total .em-tok-val {
      color: #8250df;
    }
    .em-token-counter .em-tok-cost {
      margin-left: auto; color: #1a7f37; font-weight: 600;
    }
    .em-token-counter .em-tok-cache {
      color: #0969da;
    }
    .em-token-counter .em-tok-sep {
      color: #d0d7de;
    }

    /* ── Referenced-receipt pills ────────────────────────────────── */
    .em-referenced-receipts {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
    }
    .em-receipt-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; background: #dafbe1; color: #116329;
      border: 1px solid #b4e5c1; border-radius: 10px;
      font-size: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      text-decoration: none; cursor: pointer;
    }
    .em-receipt-pill:hover { background: #b4e5c1; }
    .em-receipt-pill .material-icons { font-size: 11px; }

    /* ── AI active-question banner ───────────────────────────────── */
    .em-ai-active-question {
      background: #fff8c5; border-left: 3px solid #d4a72c;
      padding: 6px 10px; border-radius: 3px; margin: 6px 0;
      font-size: 12px; color: #633c01; line-height: 1.4;
    }
    .em-ai-active-question-label {
      font-weight: 600; font-size: 10px; text-transform: uppercase;
      letter-spacing: .4px; color: #8a6500; display: block; margin-bottom: 2px;
    }

    /* ── Tool-call log collapsible ───────────────────────────────── */
    .em-tool-calls {
      margin-top: 6px; font-size: 11px; color: #6a737d;
    }
    .em-tool-calls summary {
      cursor: pointer; font-weight: 600;
      text-transform: uppercase; letter-spacing: .4px;
      color: #57606a;
    }
    .em-tool-call-item {
      margin-top: 4px; padding: 4px 8px;
      background: #f6f8fa; border-radius: 3px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px; color: #24292f;
    }
    .em-tool-call-item.error {
      background: #ffebe9; color: #cf222e;
    }

    /* ── Follow-up button (amber; sales re-engagement) ───────────── */
    .em-compose button.followup {
      background: #d4a72c; color: #fff; border-color: #b58a00;
    }
    .em-compose button.followup:hover:not(:disabled) {
      background: #b58a00;
    }

    .em-status-pill {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
      background: #eaeef2; color: #57606a;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .em-status-pill.draft_ready,
    .em-status-pill.pending_human_review { background: #ddf4ff; color: #0969da; }
    .em-status-pill.sent                 { background: #dcffe4; color: #116329; }
    .em-status-pill.hold_uncertain,
    .em-status-pill.hold_missing_order,
    .em-status-pill.hold_login_required  { background: #ffebe9; color: #a40e26; }
    .em-status-pill.archived             { background: #eaeef2; color: #57606a; }

    .em-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1f2328; color: #fff; padding: 10px 16px; border-radius: 4px;
      font-size: 13px; z-index: 9999; box-shadow: 0 4px 12px rgba(0,0,0,.2);
      opacity: 0; transition: opacity .15s;
    }
    .em-toast.show { opacity: 1; }

    .em-muted { color: #6a737d; }
    .em-link  { color: #0366d6; cursor: pointer; text-decoration: none; }
    .em-link:hover { text-decoration: underline; }

    .em-polling-indicator { font-size: 11px; color: #9aa3ad; display: inline-flex; align-items: center; gap: 4px; }
    .em-polling-indicator::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%; background: #2ecc71;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    @media (max-width: 1100px) { .em-detail-body { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="em-app">
    <div class="em-topbar">
      <span class="em-title">EtsyMail <span class="em-tag">operator inbox · proxy mode</span></span>
      <span class="em-spacer"></span>
      <span class="em-polling-indicator" id="emPollingIndicator">polling every 5s</span>
      <span id="emBackendStatus" title="Backend connection">
        <span class="em-status-dot" id="emBackendDot"></span>
        <span id="emBackendLabel" style="font-size:12px;margin-left:4px;">Backend: checking…</span>
      </span>
      <button id="emRefreshBtn" title="Refresh now"><i class="material-icons">refresh</i>Refresh</button>
      <button id="emNewThreadBtn" title="Create test thread"><i class="material-icons">add</i>New (test)</button>
      <button id="emSettingsBtn" title="Settings"><i class="material-icons">settings</i></button>
    </div>

    <div class="em-rail" id="emRail"></div>

    <div class="em-list">
      <div class="em-list-header">
        <input type="text" id="emSearchInput" placeholder="Search customer, order…">
        <button id="emSortBtn" title="Sort"><i class="material-icons">sort</i></button>
      </div>
      <div class="em-list-items" id="emListItems">
        <div class="em-list-empty">Loading threads…</div>
      </div>
    </div>

    <div class="em-detail" id="emDetail">
      <div class="em-detail-empty">
        Select a thread on the left to view its contents.<br>
        <span class="em-muted">Use <b>New (test)</b> in the top bar to seed one for Milestone 1.</span>
      </div>
    </div>
  </div>

  <div class="em-toast" id="emToast"></div>

  <script>
  (function(){
    "use strict";

    // Same-origin Netlify functions. Override if hosted elsewhere.
    const NETLIFY_BASE = "";
    const FN = (name) => `${NETLIFY_BASE}/.netlify/functions/${name}`;

    const LIST_POLL_MS     = 5000;
    const MESSAGES_POLL_MS = 4000;
    const COUNTS_POLL_MS   = 15000;

    const THREADS_COLL = "EtsyMail_Threads";
    const CUSTOMERS_COLL = "EtsyMail_Customers";

    const RAIL_FILTERS = [
      { id: "all",                  label: "All",             icon: "inbox",          status: null },
      { id: "detected_from_gmail",  label: "New",             icon: "mail",           status: "detected_from_gmail" },
      { id: "etsy_scraped",         label: "Scraped",         icon: "cloud_download", status: "etsy_scraped" },
      { id: "draft_ready",          label: "Draft ready",     icon: "edit",           status: "draft_ready" },
      { id: "pending_human_review", label: "Needs review",    icon: "rate_review",    status: "pending_human_review" },
      { id: "sent",                 label: "Sent",            icon: "send",           status: "sent" },
      { id: "hold_uncertain",       label: "Hold · uncertain",icon: "pause",          status: "hold_uncertain" },
      { id: "hold_missing_order",   label: "Hold · no order", icon: "help",           status: "hold_missing_order" },
      { id: "hold_login_required",  label: "Hold · login",    icon: "lock",           status: "hold_login_required" },
      { id: "archived",             label: "Archived",        icon: "archive",        status: "archived" }
    ];

    const state = {
      activeFilterId : "all",
      threads        : [],
      selectedId     : null,
      messages       : [],
      searchText     : "",
      counts         : {},
      listPollTimer  : null,
      msgPollTimer   : null,
      countsPollTimer: null,
      inFlightList   : false,
      inFlightMsgs   : false
    };

    const $  = (id) => document.getElementById(id);
    const esc = (s="") => String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));

    function toast(msg, ms=2200) {
      const t = $("emToast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove("show"), ms);
    }

    // Proxy timestamps come back as {_ts:true, ms:<millis>}. Convert to Date.
    function toDate(v) {
      if (!v) return null;
      if (v && typeof v === "object" && v._ts && typeof v.ms === "number") return new Date(v.ms);
      if (v instanceof Date) return v;
      if (typeof v === "number") return new Date(v);
      if (typeof v === "string") {
        const d = new Date(v);
        return isNaN(d.getTime()) ? null : d;
      }
      return null;
    }
    function fmtTime(v) {
      const d = toDate(v);
      if (!d) return "";
      const now = new Date();
      if (d.toDateString() === now.toDateString()) {
        return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      }
      const sameYear = d.getFullYear() === now.getFullYear();
      return d.toLocaleDateString([], sameYear
        ? { month: "short", day: "numeric" }
        : { year: "numeric", month: "short", day: "numeric" });
    }

    async function api(name, { method="GET", query=null, body=null } = {}) {
      let url = FN(name);
      if (query) {
        const sp = new URLSearchParams();
        for (const [k, v] of Object.entries(query)) {
          if (Array.isArray(v)) for (const item of v) sp.append(k, item);
          else if (v !== null && v !== undefined) sp.append(k, v);
        }
        const qs = sp.toString();
        if (qs) url += "?" + qs;
      }
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const text = await res.text();
      let data = {};
      try { data = JSON.parse(text); } catch { data = { raw: text }; }
      if (!res.ok) throw new Error(data.error || `${name} ${res.status}`);
      return data;
    }

    // ───── Rail ─────
    function renderRail() {
      const rail = $("emRail");
      const sections = [
        { title: "Inbox",   items: RAIL_FILTERS.slice(0, 6) },
        { title: "On hold", items: RAIL_FILTERS.slice(6, 9) },
        { title: "Archive", items: RAIL_FILTERS.slice(9) }
      ];
      let html = "";
      for (const sec of sections) {
        html += `<div class="em-rail-section">${esc(sec.title)}</div>`;
        for (const f of sec.items) {
          const count = f.status ? (state.counts[f.status] || 0) : Object.values(state.counts).reduce((a,b)=>a+b,0);
          const active = state.activeFilterId === f.id ? " active" : "";
          html += `
            <div class="em-rail-item${active}" data-filter="${esc(f.id)}">
              <span><i class="material-icons">${esc(f.icon)}</i>${esc(f.label)}</span>
              <span class="em-count">${count}</span>
            </div>`;
        }
      }
      rail.innerHTML = html;
      rail.querySelectorAll(".em-rail-item").forEach(el => {
        el.addEventListener("click", () => {
          state.activeFilterId = el.dataset.filter;
          renderRail();
          fetchThreadListNow();
        });
      });
    }

    // ───── Thread list ─────
    function currentFilter() {
      return RAIL_FILTERS.find(f => f.id === state.activeFilterId) || RAIL_FILTERS[0];
    }

    async function fetchThreadListNow() {
      if (state.inFlightList) return;
      state.inFlightList = true;
      try {
        const filter = currentFilter();
        const query = { op: "list", coll: THREADS_COLL, orderBy: "updatedAt,desc", limit: 100 };
        if (filter.status) query.where = `status,==,${filter.status}`;
        const data = await api("firestoreProxy", { query });
        state.threads = data.docs || [];
        renderThreadList();
        setBackendOk(true, "Backend: connected");
      } catch (e) {
        console.warn("thread list fetch failed:", e.message);
        setBackendOk(false, "Backend: error");
        $("emListItems").innerHTML = `<div class="em-list-empty">
          Error loading threads:<br>${esc(e.message)}
          <br><br>
          <span class="em-muted">Ensure <code>firestoreProxy.js</code> is deployed and
          <code>EtsyMail_Threads</code> is in its <code>CALLABLE_COLLS</code> set.
          Firestore index errors will appear in the Netlify function logs with a one-click fix link.</span>
        </div>`;
      } finally {
        state.inFlightList = false;
      }
    }

    function startListPolling() {
      stopListPolling();
      fetchThreadListNow();
      state.listPollTimer = setInterval(fetchThreadListNow, LIST_POLL_MS);
    }
    function stopListPolling() {
      if (state.listPollTimer) { clearInterval(state.listPollTimer); state.listPollTimer = null; }
    }

    function renderThreadList() {
      const host = $("emListItems");
      const q = state.searchText.trim().toLowerCase();
      const filtered = q ? state.threads.filter(t =>
        (t.customerName || "").toLowerCase().includes(q) ||
        (t.linkedOrderId || "").toLowerCase().includes(q) ||
        (t.subject       || "").toLowerCase().includes(q) ||
        (t.etsyUsername  || "").toLowerCase().includes(q)
      ) : state.threads;

      if (!filtered.length) {
        host.innerHTML = `<div class="em-list-empty">No threads in this view.<br><span class="em-muted">Use <b>New (test)</b> in the top bar to seed one.</span></div>`;
        return;
      }

      host.innerHTML = filtered.map(t => {
        const selected = state.selectedId === t.id ? " selected" : "";
        const unread   = t.unread ? " unread" : "";
        const when     = fmtTime(t.lastInboundAt || t.updatedAt || t.createdAt);

        const badges = [];
        if (t.linkedOrderId)  badges.push(`<span class="em-badge order">#${esc(String(t.linkedOrderId).slice(-6))}</span>`);
        if (t.category)       badges.push(`<span class="em-badge category">${esc(t.category)}</span>`);
        if (t.confidence != null) badges.push(`<span class="em-badge confidence">${Math.round(t.confidence*100)}%</span>`);
        if ((t.riskFlags || []).includes("image_attached")) badges.push(`<span class="em-badge attachment">📎 image</span>`);
        if ((t.status || "").startsWith("hold_")) badges.push(`<span class="em-badge hold">${esc(t.status.replace("hold_","hold: "))}</span>`);

        const snippet = t.subject || t.category || t.status || "";

        return `
          <div class="em-list-item${selected}${unread}" data-id="${esc(t.id)}">
            <div class="em-name">${esc(t.customerName || "Unknown customer")}</div>
            <div class="em-time">${esc(when)}</div>
            <div class="em-snippet">${esc(snippet)}</div>
            <div class="em-badges">${badges.join("")}</div>
          </div>`;
      }).join("");

      host.querySelectorAll(".em-list-item").forEach(el => {
        el.addEventListener("click", () => openThread(el.dataset.id));
      });
    }

    // ───── Counts ─────
    async function fetchCountsNow() {
      try {
        const data = await api("etsyMailThreads", { query: { counts: 1 } });
        state.counts = data.counts || {};
        renderRail();
      } catch (e) {
        console.warn("counts fetch failed:", e.message);
      }
    }
    function startCountsPolling() {
      stopCountsPolling();
      fetchCountsNow();
      state.countsPollTimer = setInterval(fetchCountsNow, COUNTS_POLL_MS);
    }
    function stopCountsPolling() {
      if (state.countsPollTimer) { clearInterval(state.countsPollTimer); state.countsPollTimer = null; }
    }

    // ───── Detail pane ─────
    async function openThread(threadId) {
      state.selectedId = threadId;
      renderThreadList();

      api("etsyMailThreads", { method: "POST", body: { action: "markRead", threadId } }).catch(()=>{});

      let thread = state.threads.find(t => t.id === threadId);
      if (!thread) {
        try {
          const data = await api("etsyMailThreads", { query: { threadId } });
          thread = data.thread;
          state.messages = data.messages || [];
        } catch (e) {
          $("emDetail").innerHTML = `<div class="em-detail-empty">Could not load thread: ${esc(e.message)}</div>`;
          return;
        }
      }

      renderDetail(thread);
      startMessagesPolling(threadId);
    }

    async function fetchMessagesNow(threadId) {
      if (state.inFlightMsgs) return;
      state.inFlightMsgs = true;
      try {
        const data = await api("firestoreProxy", {
          query: {
            op: "listSub", coll: THREADS_COLL, id: threadId, sub: "messages",
            orderBy: "timestamp,asc", limit: 500
          }
        });
        state.messages = data.docs || [];
        renderThreadMessages();
      } catch (e) {
        console.warn("messages fetch failed:", e.message);
      } finally {
        state.inFlightMsgs = false;
      }
    }

    function startMessagesPolling(threadId) {
      stopMessagesPolling();
      fetchMessagesNow(threadId);
      state.msgPollTimer = setInterval(() => fetchMessagesNow(threadId), MESSAGES_POLL_MS);
    }
    function stopMessagesPolling() {
      if (state.msgPollTimer) { clearInterval(state.msgPollTimer); state.msgPollTimer = null; }
    }

    function renderDetail(thread) {
      if (!thread) {
        $("emDetail").innerHTML = `<div class="em-detail-empty">No thread selected.</div>`;
        return;
      }
      const t = thread;
      const isGmailLinked = !!t.gmailMessageId;
      const hasOrder      = !!t.linkedOrderId;
      const etsyUrl       = t.etsyConversationUrl || "";

      $("emDetail").innerHTML = `
        <div class="em-detail-header">
          <div class="em-h-top">
            <div>
              <h2>${esc(t.customerName || "Unknown customer")}</h2>
              <div class="em-h-meta">
                <span class="em-status-pill ${esc(t.status || "")}">${esc(t.status || "unknown")}</span>
                ${t.etsyUsername ? `<span>@${esc(t.etsyUsername)}</span>` : ""}
                ${t.customerEmail ? `<span>${esc(t.customerEmail)}</span>` : ""}
                ${hasOrder ? `<span>Order #${esc(t.linkedOrderId)}</span>` : `<span class="em-muted">no linked order</span>`}
                ${isGmailLinked ? `<span>📧 Gmail linked</span>` : ""}
              </div>
            </div>
            <div class="em-h-actions">
              ${etsyUrl ? `<a href="${esc(etsyUrl)}" target="_blank" class="em-link"><button><i class="material-icons">open_in_new</i>Open on Etsy</button></a>` : ""}
              <button id="emHoldBtn" title="Hold this thread"><i class="material-icons">pause</i>Hold</button>
              <button id="emArchiveBtn" title="Archive"><i class="material-icons">archive</i>Archive</button>
            </div>
          </div>
        </div>

        <div class="em-cust-panel collapsed" id="emCustPanel">
          <div class="em-cust-head" id="emCustHead">
            <div class="em-cust-avatar" id="emCustAvatar">—</div>
            <div class="em-cust-summary" id="emCustSummary">
              <span class="em-muted" style="font-size:12px;">Loading customer…</span>
            </div>
            <i class="material-icons em-cust-chevron">expand_more</i>
          </div>
          <div class="em-cust-expand" id="emCustExpand"></div>
        </div>

        <div class="em-detail-body">
          <div>
            <div class="em-card">
              <h4>Conversation</h4>
              <div class="em-thread" id="emThreadBox">
                <div class="em-muted" style="font-size:12px;">Loading messages…</div>
              </div>
            </div>

            <div class="em-card em-compose">
              <h4>Staff reply (local draft)</h4>
              <textarea id="emDraftText" placeholder="Type a reply, or click AI Draft to generate one. In Milestone 1 Save writes a staff message into the thread; M5 will route through extension-based send."></textarea>
              <div id="emTokenCounter" class="em-token-counter empty">
                <span class="em-tok-label">Tokens:</span>
                <span>No AI draft yet — click AI Draft below</span>
              </div>
              <div id="emReferencedReceipts" class="em-referenced-receipts" style="display:none;"></div>
              <div id="emSuggestedListings" class="em-suggested-listings" style="display:none;"></div>
              <div id="emTrackingImages" class="em-tracking-images" style="display:none;"></div>
              <div class="em-compose-bar">
                <button id="emAiDraftBtn" class="ai" title="Generate a reply with AI"><i class="material-icons">auto_awesome</i><span>AI Draft</span></button>
                <button id="emAiFollowUpBtn" class="followup" title="Generate a warm follow-up to re-engage the customer"><i class="material-icons">history</i><span>Follow up</span></button>
                <button id="emSaveStaffMsgBtn" class="primary"><i class="material-icons">save</i>Save as staff message</button>
                <button id="emClearDraftBtn"><i class="material-icons">close</i>Clear</button>
                <span class="em-muted" style="font-size:11px;align-self:center;margin-left:auto;">Auto-send is disabled in Milestone 1.</span>
              </div>
            </div>
          </div>

          <div>
            <div class="em-card">
              <h4>Thread details</h4>
              <dl class="em-kv">
                <dt>Thread ID</dt><dd style="font-family:monospace;font-size:11px;">${esc(t.id)}</dd>
                <dt>Status</dt>   <dd>${esc(t.status || "")}</dd>
                <dt>Category</dt> <dd>${esc(t.category || "—")}</dd>
                <dt>Confidence</dt><dd>${t.confidence != null ? Math.round(t.confidence*100) + "%" : "—"}</dd>
                <dt>Assigned</dt> <dd>${esc(t.assignedTo || "—")}</dd>
                <dt>Tags</dt>     <dd>${(t.tags||[]).map(esc).join(", ") || "—"}</dd>
                <dt>Risk flags</dt><dd>${(t.riskFlags||[]).map(esc).join(", ") || "—"}</dd>
                <dt>Last inbound</dt> <dd>${esc(fmtTime(t.lastInboundAt))}</dd>
                <dt>Last scraped</dt> <dd>${esc(fmtTime(t.lastSyncedAt))}</dd>
              </dl>
            </div>

            <div class="em-card">
              <h4>Linked order <span class="em-muted" style="font-weight:400;text-transform:none;letter-spacing:0;">(enriched in Milestone 3)</span></h4>
              ${hasOrder ? `
                <dl class="em-kv">
                  <dt>Order #</dt> <dd>${esc(t.linkedOrderId)}</dd>
                  <dt>Listings</dt><dd>${(t.linkedListingIds||[]).map(esc).join(", ") || "—"}</dd>
                </dl>
                <div style="margin-top:6px;font-size:11px;" class="em-muted">
                  Shipping address, tracking, and personalization populate after enrichment runs.
                </div>
              ` : `<div class="em-muted" style="font-size:12px;">No order linked yet.</div>`}
            </div>

            <div class="em-card em-ai-card">
              <h4>AI draft <span class="em-muted" style="font-weight:400;text-transform:none;letter-spacing:0;">(Milestone 4)</span></h4>
              <div id="emAiCardBody">
                <div class="em-ai-empty">
                  No AI draft yet. Click <b>AI Draft</b> under the reply box to generate one.
                </div>
              </div>
              <div class="em-revise-row" id="emReviseRow" style="display:none;">
                <input id="emReviseInput" type="text" placeholder='Extra guidance (e.g. "mention shipping timeline")' />
                <button id="emReviseBtn" class="ai"><i class="material-icons">refresh</i>Revise</button>
              </div>
            </div>
          </div>
        </div>
      `;

      renderThreadMessages();

      $("emHoldBtn")?.addEventListener("click", () => setStatus(t.id, "hold_uncertain", "operator hold"));
      $("emArchiveBtn")?.addEventListener("click", () => setStatus(t.id, "archived", "operator archive"));
      $("emClearDraftBtn")?.addEventListener("click", () => {
        $("emDraftText").value = "";
        resetTokenCounter();
        hideReferencedReceipts();
        const sl = $("emSuggestedListings"); if (sl) { sl.style.display = "none"; sl.innerHTML = ""; }
        const ti = $("emTrackingImages");    if (ti) { ti.style.display = "none"; ti.innerHTML = ""; }
      });
      $("emSaveStaffMsgBtn")?.addEventListener("click", () => saveStaffMessage(t.id));

      // ─── M4: AI draft wiring ──────────────────────────────────────────
      $("emAiDraftBtn")?.addEventListener("click", () => generateAiDraft(t.id, "initial"));
      $("emAiFollowUpBtn")?.addEventListener("click", () => generateAiDraft(t.id, "follow_up"));
      $("emReviseBtn")?.addEventListener("click", () => {
        const instructions = ($("emReviseInput")?.value || "").trim();
        generateAiDraft(t.id, "revise", instructions);
      });
      $("emReviseInput")?.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const instructions = ($("emReviseInput").value || "").trim();
          generateAiDraft(t.id, "revise", instructions);
        }
      });

      // Load the most recent draft for this thread (if any) so the operator
      // sees it immediately on reopening the thread, without having to
      // re-generate. If a draft exists, populate the textarea with its text
      // and render the AI-draft card.
      hydrateAiDraft(t);

      // M3: populate customer panel
      hydrateCustomerPanel(t);
    }

    // ─── M4: AI draft generation ────────────────────────────────────────
    // Calls etsyMailDraftReply with the current thread. The new endpoint
    // does a tool-use loop: it may call lookup_order_tracking and/or
    // lookup_order_details before composing. Those tool calls + live
    // tracking data are all surfaced in the UI.
    //
    // modes:
    //   "initial"   — fresh draft from scratch
    //   "revise"    — refine current textarea text; passes currentDraft
    //   "follow_up" — warm re-engagement for stalled threads
    async function generateAiDraft(threadId, mode = "initial", instructions = null) {
      const allBtns = ["emAiDraftBtn", "emAiFollowUpBtn", "emReviseBtn"].map($).filter(Boolean);
      const body   = $("emAiCardBody");
      const primaryBtn = mode === "follow_up" ? $("emAiFollowUpBtn")
                      : mode === "revise"     ? $("emReviseBtn")
                                              : $("emAiDraftBtn");
      const primaryLabel = primaryBtn?.querySelector("span");
      const primaryOriginalLabel = primaryLabel?.textContent;

      allBtns.forEach(b => { b.disabled = true; });
      if (primaryLabel) primaryLabel.textContent = "Generating…";

      // Show transient "thinking" state
      if (body) {
        const action = mode === "revise" ? "revising"
                    : mode === "follow_up" ? "composing follow-up"
                    : "generating";
        body.innerHTML =
          '<div class="em-ai-meta"><span class="em-ai-chip">' + esc(action) + '</span>' +
          '<span><span class="spinner" style="border-top-color:#8250df;border-color:rgba(130,80,223,.25);"></span> ' +
          'Reading thread, looking up orders if needed, composing…</span></div>';
      }
      // Also show a "thinking" state in the token counter
      const tc = $("emTokenCounter");
      if (tc) {
        tc.className = "em-token-counter empty";
        tc.innerHTML = '<span class="em-tok-label">Tokens:</span><span><span class="spinner" style="border-color:rgba(130,80,223,.3);border-top-color:#8250df;width:10px;height:10px;"></span> waiting for model…</span>';
      }

      const employeeName = getEmployeeName();
      const reqBody = { threadId, mode, employeeName };
      if (mode === "revise") {
        reqBody.currentDraft = $("emDraftText").value || "";
      }
      if (instructions && instructions.trim()) {
        reqBody.instructions = instructions.trim();
      }

      try {
        const data = await api("etsyMailDraftReply", { method: "POST", body: reqBody });
        // Populate textarea
        $("emDraftText").value = data.text || "";
        // Render AI card
        renderAiDraftCard(data);
        // Show revise row
        const row = $("emReviseRow");
        if (row) row.style.display = "flex";
        // Toast
        let msg = mode === "revise" ? "Draft revised" : mode === "follow_up" ? "Follow-up drafted" : "Draft generated";
        if (Array.isArray(data.toolCalls) && data.toolCalls.length) {
          const lookups = data.toolCalls.filter(tc => tc.name !== "compose_draft_reply").length;
          if (lookups) msg += ` (${lookups} lookup${lookups === 1 ? "" : "s"})`;
        }
        toast(msg);
      } catch (e) {
        if (body) {
          body.innerHTML = '<div class="em-ai-warning">⚠ Draft generation failed: ' + esc(e.message) + '</div>';
        }
        if (tc) {
          tc.className = "em-token-counter empty";
          tc.innerHTML = '<span class="em-tok-label">Tokens:</span><span>failed — see error above</span>';
        }
        toast("AI error: " + e.message, 4000);
      } finally {
        allBtns.forEach(b => { b.disabled = false; });
        if (primaryLabel && primaryOriginalLabel) primaryLabel.textContent = primaryOriginalLabel;
      }
    }

    // Render the AI draft card from a response payload (or a loaded draft doc).
    // Handles both shapes: the endpoint response (tokensUsed, toolCalls) and
    // the Firestore doc (aiTokensInput, aiToolCalls).
    function renderAiDraftCard(draft) {
      const body = $("emAiCardBody");
      if (!body) return;
      if (!draft || (!draft.text && !draft.reasoning)) {
        body.innerHTML = '<div class="em-ai-empty">No AI draft yet. Click <b>AI Draft</b> under the reply box to generate one.</div>';
        resetTokenCounter();
        hideReferencedReceipts();
        return;
      }

      // Normalize shape — response uses tokensUsed.*, Firestore uses aiTokens*
      const tokens = {
        input      : (draft.tokensUsed && draft.tokensUsed.input)       ?? draft.aiTokensInput       ?? 0,
        output     : (draft.tokensUsed && draft.tokensUsed.output)      ?? draft.aiTokensOutput      ?? 0,
        cacheRead  : (draft.tokensUsed && draft.tokensUsed.cacheRead)   ?? draft.aiTokensCacheRead   ?? 0,
        cacheCreate: (draft.tokensUsed && draft.tokensUsed.cacheCreate) ?? draft.aiTokensCacheCreate ?? 0
      };
      const toolCalls = draft.toolCalls || draft.aiToolCalls || [];
      const model     = draft.model || draft.aiModel || "?";
      const effort    = draft.effort || draft.aiEffort || null;
      const parsedOk  = (draft.parsedOk !== undefined) ? draft.parsedOk : (draft.aiParsedOk !== false);
      const imagesAttached = draft.imagesAttached ?? draft.aiIncludedImages ?? 0;

      // Build card HTML
      const chips = [];
      chips.push('<span class="em-ai-chip">' + esc(model) + '</span>');
      if (effort) chips.push('<span class="em-ai-chip">effort: ' + esc(effort) + '</span>');
      if (draft.aiMode === "revise" || draft.mode === "revise") chips.push('<span class="em-ai-chip">revised</span>');
      if (draft.aiMode === "follow_up" || draft.mode === "follow_up") chips.push('<span class="em-ai-chip">follow-up</span>');
      if (imagesAttached) chips.push('<span class="em-ai-chip">' + imagesAttached + ' image' + (imagesAttached === 1 ? '' : 's') + ' seen</span>');
      const nonTerminalCalls = toolCalls.filter(tc => tc.name !== "compose_draft_reply");
      if (nonTerminalCalls.length) chips.push('<span class="em-ai-chip">' + nonTerminalCalls.length + ' tool call' + (nonTerminalCalls.length === 1 ? '' : 's') + '</span>');

      let html = '<div class="em-ai-meta">' + chips.join("") + '</div>';

      if (!parsedOk) {
        html += '<div class="em-ai-warning">⚠ Model finished without cleanly calling compose_draft_reply — the reply above is the best available fallback. Edit freely or click AI Draft again.</div>';
      }

      // Active question (critical for human-review — shows what the AI
      // identified as the open question it answered)
      if (draft.activeQuestion) {
        html += '<div class="em-ai-active-question">' +
          '<span class="em-ai-active-question-label">Active question identified</span>' +
          esc(draft.activeQuestion) + '</div>';
      }

      if (draft.reasoning) {
        html += '<details class="em-ai-reasoning" open>' +
                '<summary>Why this draft?</summary>' +
                '<div style="margin-top:4px;">' + esc(draft.reasoning) + '</div>' +
                '</details>';
      }

      // Tool-call log (collapsed by default)
      if (nonTerminalCalls.length) {
        html += '<details class="em-tool-calls">' +
          '<summary>Tool calls (' + nonTerminalCalls.length + ')</summary>' +
          nonTerminalCalls.map(tc => {
            const cls = tc.error ? " error" : "";
            const params = tc.input ? Object.entries(tc.input).map(([k,v]) => k + '=' + String(v).slice(0,40)).join(', ') : "";
            const dur = tc.durationMs ? ' — ' + tc.durationMs + 'ms' : '';
            const err = tc.error ? ' — ERROR: ' + esc(tc.error) : '';
            return '<div class="em-tool-call-item' + cls + '">' +
                   '<b>' + esc(tc.name) + '</b>(' + esc(params) + ')' + esc(dur) + err +
                   '</div>';
          }).join("") +
          '</details>';
      }

      body.innerHTML = html;

      // Update token counter
      updateTokenCounter(tokens, model);

      // Referenced receipts pills
      renderReferencedReceipts(draft.referencedReceiptIds || draft.aiToolCalls?.filter(tc => tc.input?.receiptId)?.map(tc => String(tc.input.receiptId)) || []);

      // Suggested-listings chips below textarea
      renderSuggestedListings(Array.isArray(draft.suggestedListings) ? draft.suggestedListings : []);

      // Tracking images (generated by the generate_tracking_image tool)
      renderTrackingImages(Array.isArray(draft.trackingImages) ? draft.trackingImages : []);
    }

    // ─── Token counter ────────────────────────────────────────────────
    // Shows input / output / total + rough USD cost. Pricing is per model;
    // update MODEL_PRICING if Anthropic's rates change. Values below are
    // per-million-tokens in USD.
    //
    // Note Opus 4.7 uses a new tokenizer that can count up to 35% more
    // tokens than 4.6 for the same text — so costs may look higher than
    // you'd estimate from older Opus usage.
    const MODEL_PRICING = {
      // model prefix → { input $/M, output $/M, cacheRead $/M, cacheCreate $/M }
      "claude-opus-4-7"      : { input: 15,  output: 75,  cacheRead: 1.5,  cacheCreate: 18.75 },
      "claude-opus-4-6"      : { input: 15,  output: 75,  cacheRead: 1.5,  cacheCreate: 18.75 },
      "claude-sonnet-4-6"    : { input: 3,   output: 15,  cacheRead: 0.3,  cacheCreate: 3.75  },
      "claude-sonnet-4-5"    : { input: 3,   output: 15,  cacheRead: 0.3,  cacheCreate: 3.75  },
      "claude-haiku-4-5"     : { input: 1,   output: 5,   cacheRead: 0.1,  cacheCreate: 1.25  }
    };

    function pricingForModel(model) {
      if (!model) return null;
      for (const key of Object.keys(MODEL_PRICING)) {
        if (model.startsWith(key)) return MODEL_PRICING[key];
      }
      return null;
    }

    function computeCostUsd(tokens, model) {
      const p = pricingForModel(model);
      if (!p) return null;
      const mil = 1e6;
      return (
        (tokens.input       || 0) * p.input       / mil +
        (tokens.output      || 0) * p.output      / mil +
        (tokens.cacheRead   || 0) * p.cacheRead   / mil +
        (tokens.cacheCreate || 0) * p.cacheCreate / mil
      );
    }

    function fmtNum(n) {
      return (n || 0).toLocaleString("en-US");
    }

    function updateTokenCounter(tokens, model) {
      const el = $("emTokenCounter");
      if (!el) return;
      const total = (tokens.input || 0) + (tokens.output || 0);
      if (!total) {
        el.className = "em-token-counter empty";
        el.innerHTML = '<span class="em-tok-label">Tokens:</span><span>no usage reported</span>';
        return;
      }

      const cost = computeCostUsd(tokens, model);
      const cacheBits = (tokens.cacheRead || tokens.cacheCreate)
        ? '<span class="em-tok-sep">·</span><span class="em-tok-cache" title="Cache reads save input cost">cache: ' +
          fmtNum(tokens.cacheRead) + ' read / ' + fmtNum(tokens.cacheCreate) + ' write</span>'
        : '';

      el.className = "em-token-counter";
      el.innerHTML =
        '<span class="em-tok-label">Input:</span><span class="em-tok-val">' + fmtNum(tokens.input) + '</span>' +
        '<span class="em-tok-sep">·</span>' +
        '<span class="em-tok-label">Output:</span><span class="em-tok-val">' + fmtNum(tokens.output) + '</span>' +
        '<span class="em-tok-sep">·</span>' +
        '<span class="em-tok-total"><span class="em-tok-label">Total:</span><span class="em-tok-val">' + fmtNum(total) + '</span></span>' +
        cacheBits +
        (cost != null
          ? '<span class="em-tok-cost" title="Estimated cost for this draft generation">~$' +
            cost.toFixed(cost < 0.01 ? 4 : 3) + '</span>'
          : '');
    }

    function resetTokenCounter() {
      const el = $("emTokenCounter");
      if (!el) return;
      el.className = "em-token-counter empty";
      el.innerHTML = '<span class="em-tok-label">Tokens:</span><span>No AI draft yet — click AI Draft below</span>';
    }

    // ─── Referenced-receipts pills ────────────────────────────────────
    // Shows which receiptIds the AI actually looked up via tool calls.
    // Click → opens the order modal (same handler as customer-panel orders).
    function renderReferencedReceipts(ids) {
      const box = $("emReferencedReceipts");
      if (!box) return;
      if (!Array.isArray(ids) || !ids.length) {
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }
      const unique = Array.from(new Set(ids.map(String).filter(Boolean)));
      if (!unique.length) {
        box.style.display = "none";
        return;
      }
      box.style.display = "flex";
      box.innerHTML =
        '<span style="font-size:10px;color:#6a737d;text-transform:uppercase;letter-spacing:.4px;font-weight:600;align-self:center;">AI looked up:</span>' +
        unique.map(id =>
          '<span class="em-receipt-pill" data-receipt="' + esc(id) + '" title="Click to open order details">' +
            '<i class="material-icons">receipt_long</i>#' + esc(id) +
          '</span>'
        ).join("");
      box.querySelectorAll(".em-receipt-pill").forEach(el => {
        el.addEventListener("click", () => {
          // Reuse the M3 order modal. openOrderModal is defined elsewhere
          // in this file; if not available, fall back to Etsy URL.
          const id = el.dataset.receipt;
          if (typeof openOrderModal === "function") {
            openOrderModal(id);
          } else {
            window.open("https://www.etsy.com/your/orders/sold?order_id=" + encodeURIComponent(id), "_blank");
          }
        });
      });
    }

    function hideReferencedReceipts() {
      const box = $("emReferencedReceipts");
      if (box) { box.style.display = "none"; box.innerHTML = ""; }
    }

    // Render clickable chips under the textarea. Clicking a chip inserts
    // the listing URL at the caret position in the reply textarea. M5 will
    // auto-convert those URLs into rendered listing cards.
    function renderSuggestedListings(suggested) {
      const box = $("emSuggestedListings");
      if (!box) return;
      if (!suggested || !suggested.length) {
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }
      box.style.display = "flex";
      box.innerHTML = suggested.map((s, idx) =>
        '<div class="em-suggested-listing" data-idx="' + idx + '" ' +
             'title="' + esc(s.reason || "Click to insert listing URL") + '">' +
          '<i class="material-icons">local_offer</i>' +
          '<span class="em-sl-title">' + esc(s.title || ("Listing " + s.listingId)) + '</span>' +
        '</div>'
      ).join("");

      box.querySelectorAll(".em-suggested-listing").forEach(el => {
        el.addEventListener("click", () => {
          const idx = Number(el.dataset.idx);
          const s = suggested[idx];
          if (!s || !s.listingId) return;
          const url = "https://www.etsy.com/listing/" + s.listingId;
          insertAtCaret($("emDraftText"), url + "\n");
          toast("Listing URL inserted");
        });
      });
    }

    /* ── Tracking images attached to the AI draft ────────────────
     * Renders tracking-timeline thumbnails inside the composer card.
     * Each card shows:
     *   - Carrier + tracking code + current status pill
     *   - The rendered PNG thumbnail (click to enlarge in new tab)
     *   - Action buttons:
     *       Copy image      → copies the PNG bytes to clipboard
     *                         (operator pastes into Etsy compose box)
     *       Download        → saves the PNG locally
     *       Open full size  → opens the PNG in a new tab
     *       Queue for send  → toggles whether to include the image
     *                         when the reply is sent (M5; off by default
     *                         for now since extension-send isn't built)
     */
    /* Tracking-image renderer with job-polling support.
     *
     * Each image may be in one of two states:
     *   1. Inline (ready immediately)   — img.imageUrl is present
     *   2. Pending (background job)     — img.jobId is present, img.status === "pending"
     *
     * For pending images, we show a loading placeholder + poll Firestore
     * every 2.5 seconds until the job hits "ready" or "failed". Max poll
     * duration: 3 minutes (72 polls), after which we show a timeout error.
     */

    // Track active pollers so we can cancel them on re-render
    if (!window.__emTrackingPollers) window.__emTrackingPollers = new Map();

    function cancelAllTrackingPollers() {
      window.__emTrackingPollers.forEach(p => clearInterval(p));
      window.__emTrackingPollers.clear();
    }

    async function pollTrackingJob(jobId, imageIdx, imagesRef, rerender) {
      const MAX_POLLS = 72;     // 72 * 2.5s = 3 min
      const INTERVAL_MS = 2500;
      let pollCount = 0;

      const tick = async () => {
        pollCount++;
        if (pollCount > MAX_POLLS) {
          clearInterval(window.__emTrackingPollers.get(jobId));
          window.__emTrackingPollers.delete(jobId);
          // Mark as failed for UI
          const img = imagesRef[imageIdx];
          if (img) {
            img.status = "failed";
            img.errorText = "Timed out after 3 min";
            rerender();
          }
          return;
        }

        try {
          const r = await api("firestoreProxy", {
            method: "GET",
            query: { op: "get", coll: "EtsyMail_TrackingJobs", id: jobId }
          });
          if (!r || !r.exists || !r.doc) return;

          const doc = r.doc;
          if (doc.status === "ready") {
            clearInterval(window.__emTrackingPollers.get(jobId));
            window.__emTrackingPollers.delete(jobId);
            // Merge job data into the image object
            const img = imagesRef[imageIdx];
            if (img) {
              img.status           = "ready";
              img.carrier          = doc.carrier;
              img.carrierDisplay   = doc.carrierDisplay;
              img.statusText       = doc.statusText;
              img.statusKey        = doc.statusKey;
              img.estimatedDelivery= doc.estimatedDelivery;
              img.destination      = doc.destination;
              img.imageUrl         = doc.imageUrl;
              img.imageStoragePath = doc.imageStoragePath;
              img.imageWidth       = doc.imageWidth;
              img.imageHeight      = doc.imageHeight;
              img.events           = doc.events || [];
              rerender();
            }
          } else if (doc.status === "failed") {
            clearInterval(window.__emTrackingPollers.get(jobId));
            window.__emTrackingPollers.delete(jobId);
            const img = imagesRef[imageIdx];
            if (img) {
              img.status    = "failed";
              img.errorText = doc.error || "Tracking lookup failed";
              img.errorCode = doc.errorCode || null;
              rerender();
            }
          }
          // else: status still "pending" or "running" — keep polling
        } catch (e) {
          console.warn("Tracking poll error:", e.message);
          // Keep polling; might be a transient proxy error
        }
      };

      // Kick off interval + also run immediately
      const interval = setInterval(tick, INTERVAL_MS);
      window.__emTrackingPollers.set(jobId, interval);
      tick();   // don't wait 2.5s for first check
    }

    function renderTrackingImages(images) {
      const box = $("emTrackingImages");
      if (!box) return;

      // Cancel any previous pollers on re-render (avoid duplicate polling)
      cancelAllTrackingPollers();

      if (!images || !images.length) {
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }
      box.style.display = "flex";

      const rerender = () => renderTrackingImages(images);

      box.innerHTML = images.map((img, idx) => {
        const isPending  = img.status === "pending" || (!img.imageUrl && !img.errorText);
        const isFailed   = img.status === "failed";
        const isReady    = img.status === "ready" || !!img.imageUrl;

        const codeDisplay = String(img.trackingCode || "").replace(/(.{4})/g, "$1 ").trim();
        const statusCls = isFailed ? "exception"
                       : (img.statusKey || "in_transit").replace(/[^a-z_]/gi, "");
        const statusLabel = isFailed ? "Failed"
                          : isPending ? "Generating…"
                          : (img.statusText || img.status || "In Transit");
        const est = img.estimatedDelivery
          ? " · ETA " + new Date(img.estimatedDelivery).toLocaleDateString("en-US", { month: "short", day: "numeric" })
          : "";
        const dest = img.destination ? " · to " + esc(img.destination) : "";

        // Body content changes based on state
        let bodyHtml;
        if (isReady && img.imageUrl) {
          // Firebase Storage URLs don't send CORS or CORP headers, which
          // means they're blocked by our site's COEP: require-corp policy.
          // Rather than fetch-to-blob (which hits CORS), route through a
          // same-origin proxy endpoint that streams the bytes back with
          // the right headers.
          // Cache-buster: use the job's updatedAt timestamp (or imageUrl
          // itself) so the browser refetches when the snapshot refreshes.
          // The server sends an ETag matching this, so on revisits without
          // a cache change the browser gets a fast 304.
          const v = img.updatedAt?._ts ? img.updatedAt.ms
                  : img.updatedAt?.ms   ? img.updatedAt.ms
                  : Date.now();
          const proxyUrl = "/.netlify/functions/etsyMailTrackingImage?trackingCode=" +
                           encodeURIComponent(img.trackingCode) +
                           "&v=" + v;
          bodyHtml =
            '<img src="' + esc(proxyUrl) + '" ' +
                 'data-firebase-url="' + esc(img.imageUrl) + '" ' +
                 'alt="Tracking timeline for ' + esc(img.trackingCode) + '" ' +
                 'data-idx="' + idx + '" class="em-ti-img"/>';
        } else if (isFailed) {
          bodyHtml =
            '<div class="em-ti-placeholder em-ti-failed">' +
              '<i class="material-icons">error_outline</i>' +
              '<div>Tracking lookup failed</div>' +
              (img.errorText ? '<div class="em-ti-error-detail">' + esc(img.errorText) + '</div>' : '') +
            '</div>';
        } else {
          bodyHtml =
            '<div class="em-ti-placeholder em-ti-pending">' +
              '<i class="material-icons em-ti-spin">refresh</i>' +
              '<div>Generating tracking timeline…</div>' +
              '<div class="em-ti-muted">This may take up to 30 seconds</div>' +
            '</div>';
        }

        // Action buttons only shown when ready
        let actionsHtml = "";
        if (isReady) {
          actionsHtml =
            '<div class="em-tracking-image-actions">' +
              '<button class="em-ti-copy"     data-idx="' + idx + '">' +
                '<i class="material-icons">content_copy</i>Copy image</button>' +
              '<button class="em-ti-download" data-idx="' + idx + '">' +
                '<i class="material-icons">download</i>Download</button>' +
              '<button class="em-ti-open"     data-idx="' + idx + '">' +
                '<i class="material-icons">open_in_new</i>Full size</button>' +
              '<button class="em-ti-queue ' + (img.queuedForSend !== false ? "queued" : "") + '" data-idx="' + idx + '" title="Include this image when the reply is sent (M5)">' +
                '<i class="material-icons">' + (img.queuedForSend !== false ? "check_circle" : "radio_button_unchecked") + '</i>' +
                (img.queuedForSend !== false ? "Queued for send" : "Not queued") +
              '</button>' +
            '</div>';
        } else if (isFailed) {
          actionsHtml =
            '<div class="em-tracking-image-actions">' +
              '<button class="em-ti-retry" data-idx="' + idx + '">' +
                '<i class="material-icons">refresh</i>Retry</button>' +
            '</div>';
        }

        return (
          '<div class="em-tracking-image-card" data-idx="' + idx + '">' +
            '<div class="em-tracking-image-header">' +
              '<div class="em-tracking-image-header-left">' +
                '<div class="em-tracking-image-icon">' +
                  '<i class="material-icons">local_shipping</i>' +
                '</div>' +
                '<div class="em-tracking-image-meta">' +
                  '<div class="em-tracking-image-title">' +
                    esc(img.carrierDisplay || "Tracking") + esc(est) + esc(dest) +
                  '</div>' +
                  '<div class="em-tracking-image-subtitle">' + esc(codeDisplay) + '</div>' +
                '</div>' +
              '</div>' +
              '<span class="em-tracking-image-status ' + statusCls + '">' +
                esc(statusLabel) +
              '</span>' +
            '</div>' +
            '<div class="em-tracking-image-body">' + bodyHtml + '</div>' +
            actionsHtml +
          '</div>'
        );
      }).join("");

      // Start pollers for any pending jobs
      images.forEach((img, idx) => {
        if ((img.status === "pending" || (!img.imageUrl && !img.errorText)) && img.jobId) {
          pollTrackingJob(img.jobId, idx, images, rerender);
        }
      });

      // Attach button handlers (only for cards that have buttons)
      box.querySelectorAll(".em-ti-img").forEach(el => {
        el.addEventListener("click", () => {
          const idx = Number(el.dataset.idx);
          const img = images[idx];
          if (img && img.imageUrl) window.open(img.imageUrl, "_blank");
        });
      });

      box.querySelectorAll(".em-ti-copy").forEach(btn => {
        btn.addEventListener("click", async () => {
          const idx = Number(btn.dataset.idx);
          const img = images[idx];
          if (!img || !img.imageUrl) return;

          const canClipboardImage = (
            typeof ClipboardItem !== "undefined" &&
            navigator.clipboard &&
            typeof navigator.clipboard.write === "function"
          );

          if (!canClipboardImage) {
            toast("Your browser can't copy images — using Download instead");
            const r = await fetch(img.imageUrl);
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "tracking-" + String(img.trackingCode || "unknown").replace(/[^a-z0-9]/gi, "_") + ".png";
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 5000);
            return;
          }

          btn.disabled = true;
          const originalHtml = btn.innerHTML;
          btn.innerHTML = '<i class="material-icons">hourglass_empty</i>Copying…';
          try {
            const r = await fetch(img.imageUrl);
            if (!r.ok) throw new Error("Fetch failed: " + r.status);
            const blob = await r.blob();
            const pngBlob = blob.type === "image/png" ? blob : new Blob([await blob.arrayBuffer()], { type: "image/png" });
            await navigator.clipboard.write([ new ClipboardItem({ "image/png": pngBlob }) ]);
            btn.innerHTML = '<i class="material-icons">check</i>Copied!';
            toast("Tracking image copied — paste into Etsy reply");
            setTimeout(() => { btn.innerHTML = originalHtml; btn.disabled = false; }, 2000);
          } catch (err) {
            btn.innerHTML = originalHtml;
            btn.disabled = false;
            toast("Copy failed: " + err.message);
            console.error("Copy tracking image failed:", err);
          }
        });
      });

      box.querySelectorAll(".em-ti-download").forEach(btn => {
        btn.addEventListener("click", async () => {
          const idx = Number(btn.dataset.idx);
          const img = images[idx];
          if (!img || !img.imageUrl) return;
          try {
            const r = await fetch(img.imageUrl);
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "tracking-" + String(img.trackingCode || "unknown").replace(/[^a-z0-9]/gi, "_") + ".png";
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 5000);
          } catch (err) {
            toast("Download failed: " + err.message);
          }
        });
      });

      box.querySelectorAll(".em-ti-open").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.idx);
          const img = images[idx];
          if (img && img.imageUrl) window.open(img.imageUrl, "_blank");
        });
      });

      box.querySelectorAll(".em-ti-queue").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.idx);
          const img = images[idx];
          if (!img) return;
          img.queuedForSend = img.queuedForSend === false;
          const isQueued = img.queuedForSend !== false;
          btn.classList.toggle("queued", isQueued);
          btn.innerHTML = '<i class="material-icons">' +
            (isQueued ? "check_circle" : "radio_button_unchecked") +
            '</i>' + (isQueued ? "Queued for send" : "Not queued");
        });
      });

      box.querySelectorAll(".em-ti-retry").forEach(btn => {
        btn.addEventListener("click", async () => {
          const idx = Number(btn.dataset.idx);
          const img = images[idx];
          if (!img) return;
          // Reset UI state
          img.status = "pending";
          img.errorText = null;
          img.jobId = null;
          rerender();
          // Re-request from the snapshot endpoint (force refresh)
          try {
            const res = await fetch("/.netlify/functions/etsyMailTrackingSnapshot", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ trackingCode: img.trackingCode, forceRefresh: true })
            });
            const data = await res.json();
            if (data.inline && data.imageUrl) {
              // Got cache hit (weird for forceRefresh, but handle it)
              Object.assign(img, data, { status: "ready" });
              rerender();
            } else if (data.jobId) {
              img.jobId = data.jobId;
              rerender();
              pollTrackingJob(data.jobId, idx, images, rerender);
            } else {
              img.status = "failed";
              img.errorText = data.error || "Retry failed";
              rerender();
            }
          } catch (e) {
            img.status = "failed";
            img.errorText = "Retry failed: " + e.message;
            rerender();
          }
        });
      });
    }

    function insertAtCaret(textarea, text) {
      if (!textarea) return;
      const start = textarea.selectionStart || 0;
      const end   = textarea.selectionEnd   || 0;
      const value = textarea.value;
      const before = value.slice(0, start);
      const after  = value.slice(end);
      // Ensure newline separation if we're in the middle of text
      let prefix = "";
