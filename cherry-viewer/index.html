<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cherry3D Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #viewer {
      position: absolute;
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
      touch-action: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="viewer" tabindex="0"></canvas>
  <script type="module" src="./main.js"></script>
</body>
</html>
