<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cherry3D Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    #viewer {
      position: absolute;
      width: 100%; height: 100%;
      display: block;
      outline: none;
      touch-action: none;
      user-select: none;
    }

    #drop-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #drop-overlay.drag-over { background: #080d18; }

    #drop-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .drop-zone {
      border: 2px dashed #2a2a2a;
      border-radius: 16px;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-overlay.drag-over .drop-zone {
      border-color: #fcea67;
      background: rgba(252, 234, 103, 0.04);
    }

    .drop-icon { font-size: 48px; }
    .drop-title { font-size: 18px; font-weight: 600; color: #e3e3e3; }
    .drop-subtitle { font-size: 13px; color: #555; }
  </style>
</head>
<body>

  <div id="drop-overlay">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">📦</div>
      <div class="drop-title">Drop .zip here</div>
      <div class="drop-subtitle">or click to browse</div>
    </div>
    <input type="file" id="file-input" accept=".zip" style="display:none" />
  </div>

  <canvas id="viewer" tabindex="0"></canvas>

  <script type="module" src="./main.js"></script>

  <!-- ── Cherry3D Relay Bridge ─────────────────────────────────────────────
       Uses a shared Promise so fetch and main.js registration can happen
       in any order — whichever finishes last triggers the inject.
  ──────────────────────────────────────────────────────────────────────── -->
  <script>
    (() => {
      // A promise that resolves to handleFile once main.js registers it
      let _resolveHandleFile;
      const handleFileReady = new Promise(resolve => { _resolveHandleFile = resolve; });

      // main.js calls this to hand over handleFile
      window.__cherry3dSetInjectHook = (fn) => _resolveHandleFile(fn);

      // Parse hash params
      function parseRelayHash() {
        const hash = window.location.hash.slice(1);
        if (!hash || !hash.includes('relay=')) return null;
        const params = new URLSearchParams(hash);
        const url  = params.get('relay');
        const name = params.get('file') || 'game.zip';
        return url ? { url, name } : null;
      }

      const relay = parseRelayHash();
      if (!relay) return;

      // Show loading state immediately
      const titleEl    = document.querySelector('.drop-title');
      const subtitleEl = document.querySelector('.drop-subtitle');
      if (titleEl)    titleEl.textContent    = `Fetching ${relay.name}…`;
      if (subtitleEl) subtitleEl.textContent = 'Loading from Game Generator';

      // Fetch the zip AND wait for handleFile — both run in parallel,
      // inject fires only when both are ready
      // Fetch via the Netlify proxy on the Game Generator's origin —
      // this avoids the Firebase Storage CORS restriction entirely.
      const PROXY_URL = 'https://game-generator-1.goldenspike.app/.netlify/functions/cherryRelay';

      Promise.all([
        fetch(`${PROXY_URL}?path=${encodeURIComponent(relay.url)}`).then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.blob();
        }).then(blob => new File([blob], relay.name, { type: 'application/zip' })),
        handleFileReady
      ]).then(([file, handleFile]) => {
        if (titleEl)    titleEl.textContent    = `Loading ${file.name}…`;
        if (subtitleEl) subtitleEl.textContent = 'Injecting into viewer…';
        history.replaceState(null, '', window.location.pathname);
        handleFile(file);
      }).catch(err => {
        console.error('[Cherry3D Relay]', err);
        if (titleEl)    titleEl.textContent    = '⚠ Relay failed';
        if (subtitleEl) subtitleEl.textContent = err.message;
      });
    })();
  </script>
</body>
</html>
