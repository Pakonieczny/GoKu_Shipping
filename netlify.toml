# Append this block to your existing netlify.toml.
#
# Note: the function file already declares `exports.config = { schedule: "* * * * *" }`,
# so this netlify.toml entry is technically redundant. It's included here because the
# rest of the EtsyMail crons in this codebase are configured via netlify.toml and
# keeping the convention in one place makes the schedule discoverable from the repo
# root. Either form works; if you keep both, they must agree.

[functions."etsyMailListingCreatorCron"]
  schedule = "* * * * *"   # every minute
