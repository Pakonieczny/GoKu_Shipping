# ─── EtsyMail inbox UI ──────────────────────────────────────────────────────
# v1.x → v1.5: served at etsy-mail-1.goldenspike.app → /etsy-mail-1.html
# v1.6 → v1.10 + v2.0: served at etsy-mail-2.goldenspike.app → /etsy-mail-2.html
#
# The legacy redirect is preserved so anyone with the old URL bookmarked
# still lands on something working. Operators should switch to etsy-mail-2.
# When v2.0 features stabilize, the etsy-mail-1 redirect can be repointed
# to /etsy-mail-2.html so both URLs converge.
[[redirects]]
  from = "https://etsy-mail-1.goldenspike.app"
  to = "/etsy-mail-1.html"
  status = 200
  force = true

[[redirects]]
  from = "https://etsy-mail-2.goldenspike.app"
  to = "/etsy-mail-2.html"
  status = 200
  force = true
